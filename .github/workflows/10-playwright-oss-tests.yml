name: "10 - playwright: OSS acceptance tests"

on:
  workflow_call:
    inputs:
      web_url:
        description: "URL of the Agenta deployment to test against"
        required: true
        type: string
      layers:
        description: "Comma-separated test layers (all, acceptance, integration, unit)"
        required: false
        type: string
        default: "all"
      coverage:
        description: "Coverage"
        required: false
        type: string
        default: ""
      lens:
        description: "Lens"
        required: false
        type: string
        default: ""
      path:
        description: "Path"
        required: false
        type: string
        default: ""
      case:
        description: "Case"
        required: false
        type: string
        default: ""
      speed:
        description: "Speed"
        required: false
        type: string
        default: ""
      scope:
        description: "Scope"
        required: false
        type: string
        default: ""
      cost:
        description: "Cost"
        required: false
        type: string
        default: ""
      role:
        description: "Role"
        required: false
        type: string
        default: ""
      plan:
        description: "Plan"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL of the Agenta deployment to test against"
        required: true
        type: string
        default: "https://gateway-production-99ee.up.railway.app/w"
      layers:
        description: "Test layers (all or comma-separated: acceptance,integration,unit)"
        required: false
        type: string
        default: "all"
      coverage:
        description: "Coverage (smoke, full)"
        required: false
        type: string
      lens:
        description: "Lens (functional, performance, security)"
        required: false
        type: string
      path:
        description: "Path (happy, grumpy)"
        required: false
        type: string
      case:
        description: "Case (typical, edge)"
        required: false
        type: string
      speed:
        description: "Speed (fast, slow)"
        required: false
        type: string
      scope:
        description: "Scope [free-text]"
        required: false
        type: string
      cost:
        description: "Cost (free, paid)"
        required: false
        type: string
      role:
        description: "Role (owner, admin, editor, viewer)"
        required: false
        type: string
      plan:
        description: "Plan (hobby, pro, business, enterprise)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: playwright-oss-${{ inputs.web_url }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      layers_json: ${{ steps.layers.outputs.layers_json }}
    steps:
      - name: Resolve web test layers
        id: layers
        run: |
          RAW_LAYERS="$(printf "%s" "${{ inputs.layers }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          RAW_LAYERS="$RAW_LAYERS" python - <<'PY'
          import json
          import os

          raw = os.environ["RAW_LAYERS"]
          if raw in ("", "all"):
              layers = ["unit", "integration", "acceptance"]
          else:
              layers = [value for value in raw.split(",") if value]

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              output.write(f"layers_json={json.dumps(layers)}\n")
          PY

  test:
    name: Playwright OSS
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.prepare.outputs.layers_json) }}
    env:
      AGENTA_LICENSE: oss
      AGENTA_WEB_URL: ${{ inputs.web_url }}
      AGENTA_TEST_OSS_OWNER_EMAIL: ${{ secrets.AGENTA_TEST_OSS_OWNER_EMAIL }}
      AGENTA_TEST_OSS_OWNER_PASSWORD: ${{ secrets.AGENTA_TEST_OSS_OWNER_PASSWORD }}
      AGENTA_TEST_LLM_PROVIDER: mock
      AGENTA_TEST_AUTH_MODE: password
      AGENTA_TEST_EPHEMERAL_PROJECT: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile --filter agenta-web-tests...

      - name: Install Playwright browsers
        working-directory: web/tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for deployment readiness
        run: |
          # Strip any path suffix (e.g. /w) to get the base origin for health checks
          BASE_URL="$(echo "$AGENTA_WEB_URL" | sed 's|/[^/]*$||; s|/$||')"
          # If the URL had no path, use it as-is
          if ! echo "$BASE_URL" | grep -q '://'; then
            BASE_URL="$AGENTA_WEB_URL"
          fi
          echo "AGENTA_API_URL=${BASE_URL}/api" >> "$GITHUB_ENV"
          echo "AGENTA_SERVICES_URL=${BASE_URL}/services" >> "$GITHUB_ENV"
          HEALTH_URL="${BASE_URL}/api/health"
          echo "Waiting for ${HEALTH_URL} to be ready..."
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "$HEALTH_URL" 2>/dev/null; then
              echo "Deployment is ready."
              exit 0
            fi
            echo "Attempt $i/30: not ready, waiting 10s..."
            sleep 10
          done
          echo "Deployment did not become ready within 5 minutes."
          exit 1

      - name: Run Playwright tests
        working-directory: web/tests
        run: |
          TARGET_PATH="../oss/tests/playwright/${{ matrix.layer }}"

          if [ ! -d "$TARGET_PATH" ]; then
            echo "Skipping missing web layer path: $TARGET_PATH"
            exit 0
          fi

          if ! find "$TARGET_PATH" -type f ! -name '.gitkeep' | grep -q .; then
            echo "Skipping empty web layer path: $TARGET_PATH"
            exit 0
          fi

          CMD=(pnpm exec tsx playwright/scripts/run-tests.ts --reporter=html,github)

          if [ -n "${{ inputs.coverage }}" ]; then CMD+=(--coverage "${{ inputs.coverage }}"); fi
          if [ -n "${{ inputs.lens }}" ]; then CMD+=(--lens "${{ inputs.lens }}"); fi
          if [ -n "${{ inputs.path }}" ]; then CMD+=(--path "${{ inputs.path }}"); fi
          if [ -n "${{ inputs.case }}" ]; then CMD+=(--case "${{ inputs.case }}"); fi
          if [ -n "${{ inputs.scope }}" ]; then CMD+=(--scope "${{ inputs.scope }}"); fi
          if [ -n "${{ inputs.speed }}" ]; then CMD+=(--speed "${{ inputs.speed }}"); fi
          if [ -n "${{ inputs.cost }}" ]; then CMD+=(--cost "${{ inputs.cost }}"); fi
          if [ -n "${{ inputs.role }}" ]; then CMD+=(--role "${{ inputs.role }}"); fi
          if [ -n "${{ inputs.plan }}" ]; then CMD+=(--plan "${{ inputs.plan }}"); fi

          CMD+=(-- "$TARGET_PATH")
          "${CMD[@]}"

      - name: Upload test report
        id: upload_report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/tests/playwright-report/
          retention-days: 14

      - name: Upload test results
        id: upload_results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: web/tests/test-results/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="${{ steps.upload_report.outputs.artifact-url }}"
          RESULTS_URL="${{ steps.upload_results.outputs.artifact-url }}"
          JOB_STATUS="${{ job.status }}"

          {
            echo "## Playwright Test Summary"
            echo
            echo "| Item | Link | Notes |"
            echo "| --- | --- | --- |"
            echo "| Workflow run | [Open run](${RUN_URL}) | Full logs and step output |"

            if [ -n "${REPORT_URL}" ]; then
              echo "| Playwright HTML report | [Download artifact](${REPORT_URL}) | Download the zip, then open \`index.html\` locally |"
            else
              echo "| Playwright HTML report | Not available | Report upload did not complete |"
            fi

            if [ -n "${RESULTS_URL}" ]; then
              echo "| Raw failure artifacts | [Download artifact](${RESULTS_URL}) | Includes failure screenshots, videos, and traces when present |"
            else
              echo "| Raw failure artifacts | Not uploaded | Only uploaded when the job fails |"
            fi

            echo
            echo "**Job status:** \`${JOB_STATUS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
