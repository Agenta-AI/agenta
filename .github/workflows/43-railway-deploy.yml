name: "43 - railway deploy"

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. pr-123-abc1234)"
        required: true
        type: string
      pr_number:
        description: "PR number"
        required: true
        type: string
    secrets:
      RAILWAY_TOKEN:
        required: true
      AGENTA_TEST_OSS_POSTGRES_PASSWORD:
        required: true
      AGENTA_TEST_OSS_AUTH_KEY:
        required: true
      AGENTA_TEST_OSS_CRYPT_KEY:
        required: true
      AGENTA_TEST_OSS_POSTHOG_API_KEY:
        required: false
      AGENTA_TEST_OSS_SENDGRID_API_KEY:
        required: false
      AGENTA_TEST_OSS_COMPOSIO_API_KEY:
        required: false
      AGENTA_TEST_OSS_DAYTONA_API_KEY:
        required: false
    outputs:
      preview_url:
        description: "The URL of the deployed preview environment"
        value: ${{ jobs.deploy.outputs.preview_url }}
      project_name:
        description: "Railway project name"
        value: ${{ jobs.deploy.outputs.project_name }}
      environment_name:
        description: "Railway environment name"
        value: ${{ jobs.deploy.outputs.environment_name }}
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string
      pr_number:
        description: "PR number"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: railway-preview-deploy-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
      project_name: ${{ steps.deploy.outputs.project_name }}
      environment_name: ${{ steps.deploy.outputs.environment_name }}
      railway_logs_url: ${{ steps.deploy.outputs.railway_logs_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli@latest
          railway --version

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Deploy preview environment
        id: deploy
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          POSTGRES_PASSWORD: ${{ secrets.AGENTA_TEST_OSS_POSTGRES_PASSWORD }}
          AGENTA_AUTH_KEY: ${{ secrets.AGENTA_TEST_OSS_AUTH_KEY }}
          AGENTA_CRYPT_KEY: ${{ secrets.AGENTA_TEST_OSS_CRYPT_KEY }}
          POSTHOG_API_KEY: ${{ secrets.AGENTA_TEST_OSS_POSTHOG_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.AGENTA_TEST_OSS_SENDGRID_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.AGENTA_TEST_OSS_COMPOSIO_API_KEY }}
          DAYTONA_API_KEY: ${{ secrets.AGENTA_TEST_OSS_DAYTONA_API_KEY }}
          RAILWAY_POST_BOOTSTRAP_SLEEP: "2"
          RAILWAY_INFRA_SETTLE_SECONDS: "20"
          RAILWAY_APP_SETTLE_SECONDS: "0"
          RAILWAY_ALEMBIC_MAX_ATTEMPTS: "5"
          RAILWAY_RETRY_MAX: "7"
          RAILWAY_RETRY_DELAY: "5"
          SMOKE_AUTO_REPAIR: "false"
          SMOKE_MAX_RETRIES: "20"
          SMOKE_SLEEP_SECONDS: "5"
          SMOKE_MAX_WAIT_SECONDS: "300"
          SMOKE_DOMAIN_MAX_WAIT_SECONDS: "180"
        run: |
          chmod +x hosting/railway/oss/scripts/*.sh
          # shellcheck source=/dev/null
          source hosting/railway/oss/scripts/lib.sh
          # shellcheck source=/dev/null
          source hosting/railway/oss/scripts/preview-resolve-env.sh

          log_file="$(mktemp)"
          cleanup() {
            rm -f "$log_file"
          }
          trap cleanup EXIT

          project="$RAILWAY_PROJECT_NAME"
          environment_name="$RAILWAY_ENVIRONMENT_NAME"

          set +e
          hosting/railway/oss/scripts/deploy-from-images.sh 2>&1 | tee "$log_file"
          deploy_status=${PIPESTATUS[0]}
          set -e

          deploy_failed=false
          if [ "$deploy_status" -ne 0 ]; then
            deploy_failed=true
          fi

          railway_logs_url="$(grep -oP 'Build Logs:\s*\Khttps://railway\.com\S+' "$log_file" | head -n 1 || true)"
          railway_logs_url="${railway_logs_url%%$'\n'*}"
          railway_logs_url="${railway_logs_url%%&}"

          url=""

          set +e
          railway_call link --project "$project" --environment "$environment_name" --json >/dev/null 2>&1
          status_json="$(railway_call status --json 2>/dev/null)"
          domain="$(railway_call variable list -k --service gateway --environment "$environment_name" 2>/dev/null | grep '^RAILWAY_PUBLIC_DOMAIN=' | cut -d= -f2- || true)"
          set -e

          if [ -n "$domain" ]; then
            url="https://${domain}/w"
          fi

          project_id="$(printf "%s" "$status_json" | jq -r '.project.id // .projectId // empty' 2>/dev/null || true)"
          environment_id="$(printf "%s" "$status_json" | jq -r '.environment.id // .environmentId // empty' 2>/dev/null || true)"

          if [ -z "$project_id" ] || [ -z "$environment_id" ]; then
            set +e
            projects_json="$(railway_call project list --json 2>/dev/null)"
            project_id="$(printf "%s" "$projects_json" | jq -r --arg name "$project" '.[] | select(.name == $name) | .id' 2>/dev/null | head -n 1)"
            environment_json="$(railway_call environment "$environment_name" --json 2>/dev/null)"
            environment_id="$(printf "%s" "$environment_json" | jq -r '.id // .environment.id // .environmentId // empty' 2>/dev/null | head -n 1)"
            set -e
          fi

          if [ "$project_id" = "null" ]; then
            project_id=""
          fi
          if [ "$environment_id" = "null" ]; then
            environment_id=""
          fi

          if [ -n "$project_id" ] && [ -n "$environment_id" ]; then
            railway_logs_url="https://railway.com/project/${project_id}/logs?environmentId=${environment_id}"
          elif [ -n "$project_id" ]; then
            railway_logs_url="https://railway.com/project/${project_id}/logs"
          fi

          echo "preview_url=${url}" >> "$GITHUB_OUTPUT"
          echo "project_name=${project}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${environment_name}" >> "$GITHUB_OUTPUT"
          echo "railway_logs_url=${railway_logs_url}" >> "$GITHUB_OUTPUT"

          trap - EXIT
          cleanup

          if [ "$deploy_failed" = "true" ]; then
            exit 1
          fi

      - name: Post preview URL as PR comment
        if: inputs.pr_number != '' && steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const projectName = '${{ steps.deploy.outputs.project_name }}';
            const imageTag = '${{ inputs.image_tag }}';
            const marker = '<!-- railway-preview-bot -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const railwayLogsUrl = '${{ steps.deploy.outputs.railway_logs_url }}';

            const body = [
              marker,
              '### Railway Preview Environment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | ${previewUrl} |`,
              `| **Project** | \`${projectName}\` |`,
              `| **Image tag** | \`${imageTag}\` |`,
              `| **Status** | Deployed |`,
              railwayLogsUrl ? `| **Railway logs** | [Open logs](${railwayLogsUrl}) |` : null,
              `| **Workflow logs** | [View workflow run](${runUrl}) |`,
              '',
              `_Updated at ${new Date().toISOString()}_`,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Post failure comment
        if: failure() && inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const imageTag = '${{ inputs.image_tag }}';
            const marker = '<!-- railway-preview-bot -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const railwayLogsUrl = '${{ steps.deploy.outputs.railway_logs_url }}';

            const body = [
              marker,
              '### Railway Preview Environment',
              '',
              `| | |`,
              `|---|---|`,
              previewUrl ? `| **Preview URL** | ${previewUrl} |` : null,
              `| **Image tag** | \`${imageTag}\` |`,
              `| **Status** | Failed |`,
              railwayLogsUrl ? `| **Railway logs** | [Open logs](${railwayLogsUrl}) |` : null,
              `| **Logs** | [View workflow run](${runUrl}) |`,
              '',
              `_Updated at ${new Date().toISOString()}_`,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
