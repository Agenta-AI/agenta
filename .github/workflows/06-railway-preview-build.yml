name: "06 - railway preview: automation"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'api/**'
      - 'web/**'
      - 'services/**'
      - 'sdk/**'
      - 'hosting/railway/**'
      - '.github/workflows/06-railway-preview-build.yml'
      - '.github/workflows/07-railway-preview-deploy.yml'
      - '.github/workflows/10-playwright-oss-tests.yml'
      - '.github/workflows/11-railway-preview-tests.yml'
      - '.github/workflows/12-railway-preview-deploy.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      packages:
        description: "Packages to test"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - all-but-web
          - api-only
          - services-only
          - web-only
          - none
      coverage:
        description: "Coverage (smoke, full)"
        required: false
        type: string
      lens:
        description: "Lens (functional, performance, security)"
        required: false
        type: string
      path:
        description: "Path (happy, grumpy)"
        required: false
        type: string
      case:
        description: "Case (typical, edge)"
        required: false
        type: string
      speed:
        description: "Speed (fast, slow)"
        required: false
        type: string
      scope:
        description: "Scope [free-text]"
        required: false
        type: string
      cost:
        description: "Cost (free, paid)"
        required: false
        type: string
      role:
        description: "Role (owner, admin, editor, viewer)"
        required: false
        type: string
      plan:
        description: "Plan (hobby, pro, business, enterprise)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: railway-preview-automation-${{ github.event.pull_request.number || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft
    uses: ./.github/workflows/12-railway-preview-deploy.yml
    with:
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    secrets: inherit

  tests:
    needs: [deploy]
    if: needs.deploy.outputs.preview_url != ''
    uses: ./.github/workflows/11-railway-preview-tests.yml
    with:
      web_url: ${{ needs.deploy.outputs.preview_url }}
      layers: acceptance,integration
      packages: ${{ inputs.packages || 'all' }}
      coverage: ${{ inputs.coverage || '' }}
      lens: ${{ inputs.lens || '' }}
      path: ${{ inputs.path || '' }}
      case: ${{ inputs.case || '' }}
      speed: ${{ inputs.speed || '' }}
      scope: ${{ inputs.scope || '' }}
      cost: ${{ inputs.cost || '' }}
      role: ${{ inputs.role || '' }}
      plan: ${{ inputs.plan || '' }}
    secrets: inherit
