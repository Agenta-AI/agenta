name: 09 - publish helm chart

on:
  push:
    branches: [main]
    paths:
      - "hosting/helm/agenta-oss/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Build chart dependencies
        run: helm dependency build hosting/helm/agenta-oss --skip-refresh

      - name: Lint chart
        run: helm lint hosting/helm/agenta-oss --set secrets.agentaAuthKey=test --set secrets.agentaCryptKey=test --set secrets.postgresPassword=test

      - name: Package chart
        run: helm package hosting/helm/agenta-oss --destination .helm-packages

      - name: Log in to GHCR
        env:
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "$HELM_REGISTRY_PASSWORD" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Push chart to GHCR
        env:
          REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          for pkg in .helm-packages/*.tgz; do
            helm push "$pkg" "oci://ghcr.io/${REGISTRY_OWNER}/helm-charts"
          done
