name: 01 - create release branch
permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  UV_VERSION: "0.11.14"

jobs:
  bump-version:
    name: Bump version and create PR
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_versions.outputs.NEW_VERSION }}
      versions_match: ${{ steps.bump_versions.outputs.VERSIONS_MATCH }}
      pr_number: ${{ steps.create-pr.outputs.pull-request-number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install uv
        run: |
          python -m pip install "uv==${UV_VERSION}"

      - name: Bump versions and compare
        id: bump_versions
        run: |
          BUMP_TYPE=${{ inputs.release-type }}
          echo "Bumping versions to $BUMP_TYPE"

          npm install semver -g

          echo "Bumping web"
          cd web
          current_version=$(node -p "require('./package.json').version")
          new_version=$(npx semver "$current_version" -i $BUMP_TYPE)
          npm pkg set version="$new_version"
          WEB_VERSION=$new_version

          echo "Bumping web/ee"
          cd ee
          current_version=$(node -p "require('./package.json').version")
          new_version=$(npx semver "$current_version" -i $BUMP_TYPE)
          npm pkg set version="$new_version"
          EE_VERSION=$new_version
          cd ..

          echo "Bumping web/oss"
          cd oss
          current_version=$(node -p "require('./package.json').version")
          new_version=$(npx semver "$current_version" -i $BUMP_TYPE)
          npm pkg set version="$new_version"
          OSS_VERSION=$new_version
          cd ..

          echo "Bumping web/packages/agenta-api-client"
          cd packages/agenta-api-client
          current_version=$(node -p "require('./package.json').version")
          new_version=$(npx semver "$current_version" -i $BUMP_TYPE)
          npm pkg set version="$new_version"
          TS_CLIENT_VERSION=$new_version
          cd ../..

          cd ..

          echo "Bumping clients/python"
          cd clients/python
          PY_CLIENT_VERSION=$(uv version --bump "$BUMP_TYPE" --short)
          cd ../..

          echo "Bumping sdks/python"
          cd sdks/python
          PY_SDK_VERSION=$(uv version --bump "$BUMP_TYPE" --short)
          cd ../..

          echo "Bumping api"
          cd api
          API_VERSION=$(uv version --bump "$BUMP_TYPE" --short)
          cd ..

          echo "Bumping services"
          cd services
          SERVICES_VERSION=$(uv version --bump "$BUMP_TYPE" --short)
          cd ..

          echo "Bumping hosting/kubernetes/helm Chart.yaml"
          CHART_FILE=hosting/kubernetes/helm/Chart.yaml
          current_chart_version=$(awk '/^version:/ {print $2; exit}' "$CHART_FILE")
          new_chart_version=$(npx semver "$current_chart_version" -i $BUMP_TYPE)
          # version is the chart semver; appVersion tracks the app release tag (v-prefixed).
          sed -i.bak -E "s/^version: .*/version: $new_chart_version/" "$CHART_FILE"
          sed -i.bak -E "s/^appVersion: .*/appVersion: \"v$new_chart_version\"/" "$CHART_FILE"
          rm -f "$CHART_FILE.bak"
          HELM_VERSION=$new_chart_version
          # NOTE: this only bumps the chart version on the release branch.
          # The actual `helm package` / `helm push` happens in the platform
          # repo's `41-release-to-public.yml` workflow, which fires off this
          # same release branch alongside the PyPI/GHCR publishes. See the
          # platform repo for that workflow; no chart-publish step lives in
          # this application repo.

          WEB_VERSION=$(echo "$WEB_VERSION" | tr -d '[:space:]')
          EE_VERSION=$(echo "$EE_VERSION" | tr -d '[:space:]')
          OSS_VERSION=$(echo "$OSS_VERSION" | tr -d '[:space:]')
          TS_CLIENT_VERSION=$(echo "$TS_CLIENT_VERSION" | tr -d '[:space:]')
          PY_CLIENT_VERSION=$(echo "$PY_CLIENT_VERSION" | tr -d '[:space:]')
          PY_SDK_VERSION=$(echo "$PY_SDK_VERSION" | tr -d '[:space:]')
          API_VERSION=$(echo "$API_VERSION" | tr -d '[:space:]')
          SERVICES_VERSION=$(echo "$SERVICES_VERSION" | tr -d '[:space:]')
          HELM_VERSION=$(echo "$HELM_VERSION" | tr -d '[:space:]')

          echo "WEB_VERSION='$WEB_VERSION'"
          echo "EE_VERSION='$EE_VERSION'"
          echo "OSS_VERSION='$OSS_VERSION'"
          echo "TS_CLIENT_VERSION='$TS_CLIENT_VERSION'"
          echo "PY_CLIENT_VERSION='$PY_CLIENT_VERSION'"
          echo "PY_SDK_VERSION='$PY_SDK_VERSION'"
          echo "API_VERSION='$API_VERSION'"
          echo "SERVICES_VERSION='$SERVICES_VERSION'"
          echo "HELM_VERSION='$HELM_VERSION'"

          if [ "$EE_VERSION" = "$OSS_VERSION" ] && [ "$OSS_VERSION" = "$WEB_VERSION" ] && [ "$WEB_VERSION" = "$TS_CLIENT_VERSION" ] && [ "$TS_CLIENT_VERSION" = "$PY_CLIENT_VERSION" ] && [ "$PY_CLIENT_VERSION" = "$PY_SDK_VERSION" ] && [ "$PY_SDK_VERSION" = "$API_VERSION" ] && [ "$API_VERSION" = "$SERVICES_VERSION" ] && [ "$SERVICES_VERSION" = "$HELM_VERSION" ]; then
              echo "VERSIONS_MATCH=true" >> $GITHUB_OUTPUT
              echo "NEW_VERSION=$WEB_VERSION" >> $GITHUB_OUTPUT
          else
              echo "VERSIONS_MATCH=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.bump_versions.outputs.VERSIONS_MATCH == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: v${{ steps.bump_versions.outputs.NEW_VERSION }}
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          branch: release/v${{ steps.bump_versions.outputs.NEW_VERSION }}
          delete-branch: true
          title: "[release] v${{ steps.bump_versions.outputs.NEW_VERSION }}"
          body: |
            New version v${{ steps.bump_versions.outputs.NEW_VERSION }} in
            - web
              - web/oss
              - web/ee
            - services
            - api
            - sdks
              - sdks/python
            - clients
              - clients/python
              - clients/typescript
            - kubernetes
              - kubernetes/helm

      - name: Fail if versions don't match
        if: steps.bump_versions.outputs.VERSIONS_MATCH != 'true'
        run: |
          echo "Versions in the three folders do not match. Please check and update manually."
          exit 1
