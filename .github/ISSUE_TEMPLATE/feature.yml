---
name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: target-topic
    attributes:
      label: Target topic
      description: Name the path, feature area, or deployment topic affected.
      placeholder: ex. hosting/railway/oss or local Docker Compose
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - not applicable
        - provider/local
        - provider/hetzner
        - provider/railway
        - provider/aws
        - provider/azure
        - provider/gcp
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - not applicable
        - platform/local
        - platform/vps
        - platform/eks
        - platform/aks
        - platform/gke
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - not applicable
        - runtime/docker-compose
        - runtime/kubernetes
    validations:
      required: true
  - type: dropdown
    id: olap
    attributes:
      label: OLAP
      options:
        - not applicable
        - olap/local
        - olap/postgres
        - olap/tigerdata
        - olap/clickhouse
    validations:
      required: true
  - type: dropdown
    id: maintenance
    attributes:
      label: Maintenance model
      options:
        - not sure
        - maintenance/internal
        - maintenance/community
    validations:
      required: true
  - type: dropdown
    id: support
    attributes:
      label: Support expectation
      options:
        - not sure
        - support/official
        - support/experimental
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: Tell us about the problem you're facing
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your ideal solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: What other approaches have you thought about?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add labels, ownership expectations, screenshots, or path references that help scope the request.
      placeholder: Relevant labels, ownership expectations, screenshots, or examples
    validations:
      required: false
