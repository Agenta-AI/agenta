---
name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["feature"]
body:
  - type: input
    id: target-topic
    attributes:
      label: Target topic
      description: Name the path, feature area, or deployment topic affected.
      placeholder: ex. hosting/railway/oss or local Docker Compose
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: Tell us about the problem you're facing
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your ideal solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: What other approaches have you thought about?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add ownership expectations, screenshots, path references, or other details that help scope the request.
      placeholder: Ownership expectations, screenshots, path references, or examples
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: LinkedIn details
      description: (optional) We announce new features on LinkedIn. When this is announced, and you'd like a mention, we'll gladly shout you out! 
      placeholder: ex. https://www.linkedin.com/in/username/
