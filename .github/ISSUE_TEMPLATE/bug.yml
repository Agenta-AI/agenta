---
name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Describe the setup
      placeholder: |
        Example: local or cloud provider, platform, runtime/orchestration, and any relevant storage/backend details.
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: (optional) A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: (optional) If applicable, add screenshots to help explain your problem.
      placeholder: Drag and drop screenshots here or paste image URLs
    validations:
      required: false
  - type: input
    id: agenta-sdk-version
    attributes:
      label: Agenta SDK Version
      description: (optional) The version of the Agenta SDK you are using (e.g., 0.1.0)
      placeholder: e.g., 0.1.0
    validations:
      required: false
  - type: input
    id: agenta-image-tag
    attributes:
      label: Agenta Image Tag
      description: (optional) The version of your self-hosted Agenta instance (if applicable)
      placeholder: e.g., 0.1.0
    validations:
      required: false
  - type: textarea
    id: important-context
    attributes:
      label: Important Context
      description: |
        (optional) Add context about the problem here.
        Include environment details, relevant paths, screenshots, or logs that help locate the affected setup.
      placeholder: |
        Repository paths, logs, screenshots, error messages, or any other relevant details...
      value: |
        <!-- If this relates to self-hosting, describe whether it is local or on a cloud provider, which platform/runtime you use, and any backend details that matter. -->
    validations:
      required: false
