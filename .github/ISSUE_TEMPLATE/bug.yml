---
name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - not applicable
        - provider/local
        - provider/hetzner
        - provider/railway
        - provider/aws
        - provider/azure
        - provider/gcp
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - not applicable
        - platform/local
        - platform/vps
        - platform/eks
        - platform/aks
        - platform/gke
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - not applicable
        - runtime/docker-compose
        - runtime/kubernetes
    validations:
      required: true
  - type: dropdown
    id: olap
    attributes:
      label: OLAP
      options:
        - not applicable
        - olap/local
        - olap/postgres
        - olap/tigerdata
        - olap/clickhouse
    validations:
      required: true
  - type: dropdown
    id: maintenance
    attributes:
      label: Maintenance model
      options:
        - not sure
        - maintenance/internal
        - maintenance/community
    validations:
      required: true
  - type: dropdown
    id: support
    attributes:
      label: Support level
      options:
        - not sure
        - support/official
        - support/experimental
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: (optional) A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: (optional) If applicable, add screenshots to help explain your problem.
      placeholder: Drag and drop screenshots here or paste image URLs
    validations:
      required: false
  - type: input
    id: agenta-sdk-version
    attributes:
      label: Agenta SDK Version
      description: (optional) The version of the Agenta SDK you are using (e.g., 0.1.0)
      placeholder: e.g., 0.1.0
    validations:
      required: false
  - type: input
    id: agenta-image-tag
    attributes:
      label: Agenta Image Tag
      description: (optional) The version of your self-hosted Agenta instance (if applicable)
      placeholder: e.g., 0.1.0
    validations:
      required: false
  - type: textarea
    id: important-context
    attributes:
      label: Important Context
      description: |
        (optional) Add context about the problem here.
        Include paths, labels, environment details, screenshots, or logs that help locate the affected topic.
      placeholder: |
        Repository paths, logs, screenshots, error messages, or any other relevant details...
      value: |
        <!-- If this relates to a self-hosted setup, include the provider/platform/runtime/olap combination if known. -->
    validations:
      required: false
