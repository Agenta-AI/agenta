---
name: Question
description: Ask for help with setup, usage, or repository topics
title: "[Question]: "
labels: ["question"]
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - not applicable
        - provider/local
        - provider/hetzner
        - provider/railway
        - provider/aws
        - provider/azure
        - provider/gcp
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - not applicable
        - platform/local
        - platform/vps
        - platform/eks
        - platform/aks
        - platform/gke
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - not applicable
        - runtime/docker-compose
        - runtime/kubernetes
    validations:
      required: true
  - type: dropdown
    id: olap
    attributes:
      label: OLAP
      options:
        - not applicable
        - olap/local
        - olap/postgres
        - olap/tigerdata
        - olap/clickhouse
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe the setup or usage question clearly.
      placeholder: What are you trying to do, and where are you blocked?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share the paths, docs, commands, or screenshots that are relevant.
      placeholder: Repository paths, environment details, logs, or screenshots
    validations:
      required: false
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      placeholder: List the docs or commands you already used
    validations:
      required: false
