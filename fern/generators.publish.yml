# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: openapi/openapi.json
      origin: https://cloud.agenta.ai/api/openapi.json
default-group: all
groups:
  ts-sdk:
    generators:
      - name: fern-typescript-sdk
        version: 3.53.11
        output:
          location: npm
          package-name: agenta-client
          token: OIDC
        config:
          namespaceExport: AgentaClient
        github:
          repository: Agenta-AI/agenta-client-typescript
  python-sdk:
    generators:
      - name: fern-python-sdk
        version: 4.63.3
        output:
          location: pypi
          package-name: agenta-client
          token: ${PYPI_TOKEN}
        config:
          client_class_name: AgentaClient
        github:
          repository: Agenta-AI/agenta-client-python
  rust-sdk:
    generators:
      - name: fern-rust-sdk
        version: 0.19.2
        output:
          location: crates
          package-name: agenta-client
          token: ${CRATES_IO_API_KEY}
        config:
          clientClassName: AgentaClient
        github:
          repository: Agenta-AI/agenta-client-rust
  go-sdk:
    generators:
      - name: fern-go-sdk
        version: 1.29.1
        github:
          repository: Agenta-AI/agenta-client-go

aliases:
  all:
    - ts-sdk
    - python-sdk
    - rust-sdk
    - go-sdk
