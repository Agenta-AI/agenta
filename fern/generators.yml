# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: openapi/openapi.json
      origin: https://cloud.agenta.ai/api/openapi.json
default-group: all
groups:
  ts-sdk:
    generators:
      - name: fern-typescript-sdk
        version: 3.53.11
        output:
          location: local-file-system
          path: ../.clients/typescript
  python-sdk:
    generators:
      - name: fern-python-sdk
        version: 4.63.3
        output:
          location: local-file-system
          path: ../.clients/python
  rust-sdk:
    generators:
      - name: fern-rust-sdk
        version: 0.19.2
        output:
          location: local-file-system
          path: ../.clients/rust
  go-sdk:
    generators:
      - name: fern-go-sdk
        version: 1.29.1
        output:
          location: local-file-system
          path: ../.clients/go
        config:
          module:
            path: sdk

aliases:
  all:
    - ts-sdk
    - python-sdk
    - rust-sdk
    - go-sdk
