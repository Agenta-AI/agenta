name: agenta-ee-gh

# ================================================================== #
# Requires GHCR login with a PAT that has read:packages scope :
#   echo $GHCR_PAT | docker login ghcr.io -u <github-username> --password-stdin
#
# EE images are private packages hosted at ghcr.io/agenta-ai/internal-ee-agenta-*.
# Set image tags via environment variables (defaults to latest):
#   AGENTA_API_IMAGE_TAG=a1b2c3d4 docker compose --env-file ./.env.ee.gh -f docker-compose.gh.yml up
# ================================================================== #

services:
    web:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_WEB_IMAGE_NAME:-internal-ee-agenta-web}:${AGENTA_WEB_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command: sh -c "node ./ee/server.js"
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.web.rule=PathPrefix(`/`)"
            - "traefik.http.routers.web.entrypoints=web"
            - "traefik.http.services.web.loadbalancer.server.port=3000"
        # === LIFECYCLE ============================================ #
        restart: always

    api:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_API_IMAGE_NAME:-internal-ee-agenta-api}:${AGENTA_API_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command: >
            gunicorn entrypoints.routers:app
            --bind 0.0.0.0:8000
            --worker-class uvicorn.workers.UvicornWorker
            --workers 2
            --worker-connections 1000
            --backlog 2048
            --keep-alive 5
            --max-requests 10000
            --max-requests-jitter 1000
            --timeout 60
            --graceful-timeout 30
            --log-level info
            --access-logfile -
            --error-logfile -
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            - SCRIPT_NAME=/api
            - DOCKER_NETWORK_MODE=${DOCKER_NETWORK_MODE:-bridge}
            - AGENTA_STORE_ENDPOINT_URL=${AGENTA_STORE_ENDPOINT_URL:-}
            - AGENTA_STORE_ACCESS_KEY=${AGENTA_STORE_ACCESS_KEY:-}
            - AGENTA_STORE_SECRET_KEY=${AGENTA_STORE_SECRET_KEY:-}
            - AGENTA_STORE_REGION=${AGENTA_STORE_REGION:-}
            - AGENTA_STORE_BUCKET=${AGENTA_STORE_BUCKET:-}
            - AGENTA_STORE_SIGNING_KEY=${AGENTA_STORE_SIGNING_KEY:-}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            supertokens:
                condition: service_healthy
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.api.rule=PathPrefix(`/api/`)"
            - "traefik.http.routers.api.entrypoints=web"
            # Do NOT strip /api: the app is mounted at /api (SCRIPT_NAME + FastAPI root_path).
            # Forward /api/* unchanged so app-generated redirects keep the prefix.
            - "traefik.http.services.api.loadbalancer.server.port=8000"
            - "traefik.http.routers.api.service=api"
        # === LIFECYCLE ============================================ #
        restart: always

    worker-streams:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_API_IMAGE_NAME:-internal-ee-agenta-api}:${AGENTA_API_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command:
            [
                "python",
                "-m",
                "entrypoints.worker_streams",
            ]
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            - DOCKER_NETWORK_MODE=${DOCKER_NETWORK_MODE:-bridge}
            # empty ⇒ all stream loops; see docs/designs/workers-sprawl/specs.md
            - AGENTA_WORKER_STREAMS=
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "python", "-c", "import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes().decode('utf-8','ignore'); sys.exit(0 if 'entrypoints.worker_streams' in cmd else 1)"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    worker-queues:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_API_IMAGE_NAME:-internal-ee-agenta-api}:${AGENTA_API_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command:
            [
                "python",
                "-m",
                "entrypoints.worker_queues",
            ]
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            - DOCKER_NETWORK_MODE=${DOCKER_NETWORK_MODE:-bridge}
            # empty ⇒ all queue loops; see docs/designs/workers-sprawl/specs.md
            - AGENTA_WORKER_QUEUES=
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "python", "-c", "import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes().decode('utf-8','ignore'); sys.exit(0 if 'entrypoints.worker_queues' in cmd else 1)"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    cron:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_API_IMAGE_NAME:-internal-ee-agenta-api}:${AGENTA_API_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        init: true
        command: supercronic /app/crontab
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            - DOCKER_NETWORK_MODE=${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            - postgres
            - api
        # === LIFECYCLE ============================================ #
        restart: always

    alembic:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_API_IMAGE_NAME:-internal-ee-agenta-api}:${AGENTA_API_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command: sh -c "python -m ee.databases.postgres.migrations.runner"
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy

    services:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_SERVICES_IMAGE_NAME:-internal-ee-agenta-services}:${AGENTA_SERVICES_IMAGE_TAG:-latest}
        # === EXECUTION ============================================ #
        command: >
            gunicorn entrypoints.main:app
            --bind 0.0.0.0:8080
            --worker-class uvicorn.workers.UvicornWorker
            --workers 2
            --worker-connections 1000
            --backlog 2048
            --keep-alive 5
            --max-requests 10000
            --max-requests-jitter 1000
            --timeout 60
            --graceful-timeout 60
            --log-level info
            --access-logfile -
            --error-logfile -
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            - SCRIPT_NAME=/services
            - DOCKER_NETWORK_MODE=${DOCKER_NETWORK_MODE:-bridge}
            - AGENTA_RUNNER_INTERNAL_URL=${AGENTA_RUNNER_INTERNAL_URL:-http://runner:8765}
            - AGENTA_STORE_ENDPOINT_URL=${AGENTA_STORE_ENDPOINT_URL:-}
            - AGENTA_STORE_ACCESS_KEY=${AGENTA_STORE_ACCESS_KEY:-}
            - AGENTA_STORE_SECRET_KEY=${AGENTA_STORE_SECRET_KEY:-}
            - AGENTA_STORE_REGION=${AGENTA_STORE_REGION:-}
            - AGENTA_STORE_BUCKET=${AGENTA_STORE_BUCKET:-}
            - AGENTA_STORE_SIGNING_KEY=${AGENTA_STORE_SIGNING_KEY:-}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            runner:
                condition: service_healthy
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.services.rule=PathPrefix(`/services/`)"
            - "traefik.http.routers.services.entrypoints=web"
            - "traefik.http.middlewares.services-strip.stripprefix.prefixes=/services"
            - "traefik.http.middlewares.services-strip.stripprefix.forceslash=true"
            - "traefik.http.routers.services.middlewares=services-strip"
            - "traefik.http.services.services.loadbalancer.server.port=8080"
            - "traefik.http.routers.services.service=services"
        # === LIFECYCLE ============================================ #
        restart: always

    runner:
        # === IMAGE ================================================ #
        image: ghcr.io/agenta-ai/${AGENTA_RUNNER_IMAGE_NAME:-internal-ee-agenta-runner}:${AGENTA_RUNNER_IMAGE_TAG:-latest}
        # === CONFIGURATION ======================================== #
        environment:
            AGENTA_RUNNER_PORT: "8765"
            AGENTA_RUNNER_HOST: ${AGENTA_RUNNER_HOST:-0.0.0.0}
            AGENTA_API_INTERNAL_URL: ${AGENTA_API_INTERNAL_URL:-http://api:8000}
            AGENTA_API_KEY: ${AGENTA_API_KEY:-}
            SANDBOX_AGENT_PROVIDER: ${SANDBOX_AGENT_PROVIDER:-local}
            PI_CODING_AGENT_DIR: ${PI_CODING_AGENT_DIR:-/pi-agent}
            DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
            DAYTONA_API_URL: ${DAYTONA_API_URL:-}
            DAYTONA_TARGET: ${DAYTONA_TARGET:-}
            DAYTONA_SNAPSHOT: ${DAYTONA_SNAPSHOT:-}
            DAYTONA_SNAPSHOT_AGENT: ${DAYTONA_SNAPSHOT_AGENT:-}
            DAYTONA_IMAGE: ${DAYTONA_IMAGE:-}
            DAYTONA_AUTOSTOP: ${DAYTONA_AUTOSTOP:-}
            AGENTA_RUNNER_DAYTONA_SESSION_IDLE_TTL_MS: ${AGENTA_RUNNER_DAYTONA_SESSION_IDLE_TTL_MS:-}
            AGENTA_RUNNER_DAYTONA_SESSION_MAX_WARM: ${AGENTA_RUNNER_DAYTONA_SESSION_MAX_WARM:-}
            DAYTONA_AUTODELETE: ${DAYTONA_AUTODELETE:-}
            AGENTA_AGENT_SANDBOX_PI_INSTALLED: ${AGENTA_AGENT_SANDBOX_PI_INSTALLED:-true}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === RUNTIME ============================================== #
        # FUSE for geesefs mounts (local sandbox cwd). Mirrors docker-compose.dev.yml.
        cap_add:
            - SYS_ADMIN
        devices:
            - /dev/fuse
        security_opt:
            - apparmor:unconfined
        # === LABELS =============================================== #
        labels:
            - "traefik.enable=false"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8765/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    postgres:
        # === IMAGE ================================================ #
        image: postgres:17
        # === STORAGE ============================================== #
        volumes:
            - postgres-data:/var/lib/postgresql/data/
            - ../../../api/ee/databases/postgres/init-db-ee.sql:/docker-entrypoint-initdb.d/init-db.sql
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-username}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U username -d agenta_ee_core"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis-volatile:
        # === IMAGE ================================================ #
        image: redis:8
        # === EXECUTION ============================================ #
        command: >
            redis-server
            --appendonly no
            --save ""
            --maxmemory 512mb
            --maxmemory-policy volatile-lru
            --port 6379
        # === STORAGE ============================================== #
        volumes:
            - redis-volatile-data:/data
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === LABELS =============================================== #
        labels:
            - "traefik.enable=false"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6379", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    redis-durable:
        # === IMAGE ================================================ #
        image: redis:8
        # === EXECUTION ============================================ #
        command: >
            redis-server
            --appendonly yes
            --appendfsync no
            --aof-load-corrupt-tail-max-size 1048576
            --save ""
            --maxmemory 512mb
            --maxmemory-policy noeviction
            --port 6381
        # === STORAGE ============================================== #
        volumes:
            - redis-durable-data:/data
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === LABELS =============================================== #
        labels:
            - "traefik.enable=false"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6381", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    traefik:
        # === IMAGE ================================================ #
        image: traefik:2
        # === EXECUTION ============================================ #
        command:
            - --api.dashboard=true
            - --providers.docker
            - --providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME:-agenta-ee-gh}`)
            - --entrypoints.web.address=:80
        # === STORAGE ============================================== #
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        ports:
            - "${TRAEFIK_PORT:-80}:80"
            - "${TRAEFIK_UI_PORT:-8080}:8080"
        # === LIFECYCLE ============================================ #
        restart: always

    supertokens:
        # === IMAGE ================================================ #
        image: supertokens/supertokens-postgresql:11
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            POSTGRESQL_CONNECTION_URI: ${POSTGRES_URI_SUPERTOKENS:-postgresql://username:password@postgres:5432/agenta_ee_supertokens}
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: >
                bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
            interval: 10s
            timeout: 5s
            retries: 5

    # Dev tunnel for Composio trigger events (disable: run.sh --no-tunnel).
    composio:
        # === ACTIVATION =========================================== #
        profiles:
            - with-tunnel
        # === IMAGE ================================================ #
        image: python:3.13-slim-trixie
        # === EXECUTION ============================================ #
        command:
            - bash
            - -c
            - "pip install --quiet --root-user-action=ignore composio httpx && python /app/dispatcher_composio.py"
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/entrypoints/dispatcher_composio.py:/app/dispatcher_composio.py:ro
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.gh}
        environment:
            AGENTA_INGRESS_URL: http://api:8000/triggers/composio/events/
            PYTHONUNBUFFERED: "1"
        # === NETWORK ============================================== #
        networks:
            - agenta-ee-gh-network
        # === ORCHESTRATION ======================================== #
        depends_on:
            api:
                condition: service_started
        # === LIFECYCLE ============================================ #
        restart: always

networks:
    agenta-ee-gh-network:

volumes:
    postgres-data:
    redis-volatile-data:
    redis-durable-data:
