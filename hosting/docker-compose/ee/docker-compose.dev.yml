name: agenta-ee-dev

services:
    .api:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        build:
            context: ../../..
            dockerfile: api/ee/docker/Dockerfile.dev
        # === EXECUTION ============================================ #
        command: ["true"]

    .web:
        # === ACTIVATION =========================================== #
        profiles:
            - with-web
        # === IMAGE ================================================ #
        image: agenta-ee-dev-web:latest
        build:
            context: ../../../web
            dockerfile: ee/docker/Dockerfile.dev
        # === EXECUTION ============================================ #
        command: ["true"]

    .services:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-services:latest
        build:
            context: ../../..
            dockerfile: services/ee/docker/Dockerfile.dev
        # === EXECUTION ============================================ #
        command: ["true"]

    .sandbox-agent:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-sandbox-agent:latest
        build:
            context: ../../../services/agent
            dockerfile: docker/Dockerfile.dev
        # === EXECUTION ============================================ #
        command: ["true"]

    web:
        # === ACTIVATION =========================================== #
        profiles:
            - with-web
        # === IMAGE ================================================ #
        image: agenta-ee-dev-web:latest
        # === EXECUTION ============================================ #
        command: sh -c "pnpm dev-ee"
        # === STORAGE ============================================== #
        volumes:
            - ../../../web/ee/src:/app/ee/src
            - ../../../web/ee/public:/app/ee/public
            - ../../../web/oss/src:/app/oss/src
            - ../../../web/oss/public:/app/oss/public
            - ../../../web/packages:/app/packages
            - nextjs-ee-cache:/app/ee/.next/cache
            - nextjs-oss-cache:/app/oss/.next/cache
            - turbo-ee-cache:/app/.turbo
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
            WATCHPACK_POLLING: "true"
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.agenta-web.rule=PathPrefix(`/`)"
            - "traefik.http.routers.agenta-web.entrypoints=web"
            - "traefik.http.services.agenta-web.loadbalancer.server.port=3000"
        # === LIFECYCLE ============================================ #
        restart: always

    api:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command:
            [
                "uvicorn",
                "entrypoints.routers:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--reload",
                "--reload-dir",
                "/app/ee/src",
                "--reload-dir",
                "/app/ee/databases",
                "--reload-dir",
                "/app/oss/src",
                "--reload-dir",
                "/app/oss/databases",
                "--reload-dir",
                "/app/entrypoints",
                "--reload-dir",
                "/sdks/python/agenta",
                "--reload-dir",
                "/clients/python/agenta_client",
                "--reload-exclude",
                "*.pyc",
                "--reload-exclude",
                "__pycache__",
                "--root-path",
                "/api",
                "--loop",
                "uvloop",
                "--http",
                "httptools",
            ]
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            supertokens:
                condition: service_healthy
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.api.rule=PathPrefix(`/api/`)"
            - "traefik.http.routers.api.entrypoints=web"
            - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
            - "traefik.http.middlewares.api-strip.stripprefix.forceslash=true"
            - "traefik.http.routers.api.middlewares=api-strip"
            - "traefik.http.services.api.loadbalancer.server.port=8000"
            - "traefik.http.routers.api.service=api"
        # === LIFECYCLE ============================================ #
        restart: always

    worker-evaluations:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command: >
            watchmedo auto-restart --directory=/app/ee/src --directory=/app/ee/databases --directory=/app/oss/src
            --directory=/app/oss/databases --directory=/app/entrypoints --directory=/sdks/python/agenta
            --directory=/clients/python/agenta_client --pattern=*.py --recursive --ignore-patterns=*/tests/* --
            python -m entrypoints.worker_evaluations
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always

    worker-tracing:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command: >
            watchmedo auto-restart --directory=/app/ee/src --directory=/app/ee/databases --directory=/app/oss/src
            --directory=/app/oss/databases --directory=/app/entrypoints --directory=/sdks/python/agenta
            --directory=/clients/python/agenta_client --pattern=*.py --recursive --ignore-patterns=*/tests/* --
            python -m entrypoints.worker_tracing
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always

    worker-webhooks:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command: >
            watchmedo auto-restart --directory=/app/ee/src --directory=/app/ee/databases --directory=/app/oss/src
            --directory=/app/oss/databases --directory=/app/entrypoints --directory=/sdks/python/agenta
            --directory=/clients/python/agenta_client --pattern=*.py --recursive --ignore-patterns=*/tests/* --
            python -m entrypoints.worker_webhooks
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "python", "-c", "import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes().decode('utf-8','ignore'); sys.exit(0 if 'entrypoints.worker_webhooks' in cmd else 1)"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    worker-events:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command: >
            watchmedo auto-restart --directory=/app/ee/src --directory=/app/ee/databases --directory=/app/oss/src
            --directory=/app/oss/databases --directory=/app/entrypoints --directory=/sdks/python/agenta
            --directory=/clients/python/agenta_client --pattern=*.py --recursive --ignore-patterns=*/tests/* --
            python -m entrypoints.worker_events
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
            redis-volatile:
                condition: service_healthy
            redis-durable:
                condition: service_healthy
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "python", "-c", "import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes().decode('utf-8','ignore'); sys.exit(0 if 'entrypoints.worker_events' in cmd else 1)"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    cron:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        init: true
        command: supercronic /app/crontab
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/oss/src/crons/queries.sh:/queries.sh
            - ../../../api/ee/src/crons/meters.sh:/meters.sh
            - ../../../api/ee/src/crons/spans.sh:/spans.sh
            - ../../../api/ee/src/crons/events.sh:/events.sh
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            - postgres
            - api
        # === LIFECYCLE ============================================ #
        restart: always

    alembic:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-api:latest
        # === EXECUTION ============================================ #
        command: sh -c "python -m ee.databases.postgres.migrations.runner"
        # === STORAGE ============================================== #
        volumes:
            - ../../../api/ee:/app/ee
            - ../../../api/oss:/app/oss
            - ../../../api/entrypoints:/app/entrypoints
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy

    services:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-services:latest
        # === EXECUTION ============================================ #
        command:
            [
                "uvicorn",
                "entrypoints.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8080",
                "--reload",
                "--reload-dir",
                "/app/oss/src",
                "--reload-dir",
                "/app/entrypoints",
                "--reload-dir",
                "/sdks/python/agenta",
                "--reload-dir",
                "/clients/python/agenta_client",
                "--reload-exclude",
                "*.pyc",
                "--reload-exclude",
                "__pycache__",
                "--root-path",
                "/services",
                "--loop",
                "uvloop",
                "--http",
                "httptools",
            ]
        # === STORAGE ============================================== #
        volumes:
            - ../../../services:/app
            - ../../../sdks/python:/sdks/python
            - ../../../clients/python:/clients/python
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
            AGENTA_AGENT_RUNNER_URL: ${AGENTA_AGENT_RUNNER_URL:-http://sandbox-agent:8765}
            AGENTA_AGENT_ENABLE_MCP: ${AGENTA_AGENT_ENABLE_MCP:-false}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        extra_hosts:
            - "host.docker.internal:host-gateway"
        # === ORCHESTRATION ======================================== #
        depends_on:
            sandbox-agent:
                condition: service_healthy
        # === LABELS =============================================== #
        labels:
            - "traefik.http.routers.services.rule=PathPrefix(`/services/`)"
            - "traefik.http.routers.services.entrypoints=web"
            - "traefik.http.middlewares.services-strip.stripprefix.prefixes=/services"
            - "traefik.http.middlewares.services-strip.stripprefix.forceslash=true"
            - "traefik.http.routers.services.middlewares=services-strip"
            - "traefik.http.services.services.loadbalancer.server.port=8080"
            - "traefik.http.routers.services.service=services"
        # === LIFECYCLE ============================================ #
        restart: always

    sandbox-agent:
        # === IMAGE ================================================ #
        image: agenta-ee-dev-sandbox-agent:latest
        # === EXECUTION ============================================ #
        # No file watcher (the box's inotify limit is shared across stacks). Copy the
        # read-only mounted Pi login into a writable path so OAuth refresh stays
        # in-container. This command replaces the image CMD, so the Pi extension rebuild
        # has to live here too: dist/ is not bind-mounted and src/extensions/agenta.ts is,
        # so without this a restart keeps a stale bundle and custom tools silently stop
        # being delivered on the sandbox-agent path. Rebuild from the mounted
        # src on start; fail loud if it cannot build rather than run a stale bundle.
        command: >
            sh -c "mkdir -p /pi-agent && cp -a /pi-agent-ro/. /pi-agent/ 2>/dev/null || true;
            node scripts/build-extension.mjs &&
            exec node_modules/.bin/tsx src/server.ts"
        # === CONFIGURATION ======================================== #
        # Deliberately no env_file: the harness sandbox must not inherit the stack's
        # secrets (COMPOSIO_API_KEY, STRIPE/POSTHOG/GOOGLE keys, ...). Tools run
        # server-side via /tools/call, so the sandbox only needs its own port, the Pi
        # login (mounted below), the OTLP export fallback, and the Daytona credentials
        # the runner reads for the `daytona` sandbox provider.
        environment:
            PORT: "8765"
            PI_CODING_AGENT_DIR: /pi-agent
            # Tracing export fallback (used when a request carries no usable OTLP
            # credential). Must be reachable from this container.
            AGENTA_HOST: ${AGENTA_HOST:-http://144.76.237.122:8280}
            AGENTA_API_KEY: ${AGENTA_API_KEY:-}
            SANDBOX_AGENT_PROVIDER: ${SANDBOX_AGENT_PROVIDER:-local}
            SANDBOX_AGENT_DAYTONA_API_KEY: ${SANDBOX_AGENT_DAYTONA_API_KEY:-}
            SANDBOX_AGENT_DAYTONA_API_URL: ${SANDBOX_AGENT_DAYTONA_API_URL:-}
            SANDBOX_AGENT_DAYTONA_TARGET: ${SANDBOX_AGENT_DAYTONA_TARGET:-}
            SANDBOX_AGENT_DAYTONA_SNAPSHOT: ${SANDBOX_AGENT_DAYTONA_SNAPSHOT:-agenta-sandbox-pi}
            SANDBOX_AGENT_DAYTONA_IMAGE: ${SANDBOX_AGENT_DAYTONA_IMAGE:-}
            SANDBOX_AGENT_DAYTONA_INSTALL_PI: ${SANDBOX_AGENT_DAYTONA_INSTALL_PI:-false}
        # === STORAGE ============================================== #
        volumes:
            - ../../../services/agent/src:/app/src
            # The Agenta harness's forced skills are real files the runner lays into the
            # sandbox per run (resolved from /app/skills). Bind-mounted like src so edits are
            # live; the prod image bakes them with `COPY skills ./skills`.
            - ../../../services/agent/skills:/app/skills
            - ${HOME}/.pi/agent:/pi-agent-ro:ro
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8765/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    postgres:
        # === IMAGE ================================================ #
        image: postgres:17
        # === STORAGE ============================================== #
        volumes:
            - postgres-data:/var/lib/postgresql/data/
            - ../../../api/ee/databases/postgres/init-db-ee.sql:/docker-entrypoint-initdb.d/init-db.sql
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-username}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U username -d agenta_ee_core"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis-volatile:
        # === IMAGE ================================================ #
        image: redis:8
        # === EXECUTION ============================================ #
        command: >
            redis-server
            --appendonly no
            --save ""
            --maxmemory 512mb
            --maxmemory-policy volatile-lru
            --port 6379
        # === STORAGE ============================================== #
        volumes:
            - redis-volatile-data:/data
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # ports:
        #     - "6379:6379"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6379", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    redis-durable:
        # === IMAGE ================================================ #
        image: redis:8
        # === EXECUTION ============================================ #
        command: >
            redis-server
            --appendonly yes
            --appendfsync no
            --save ""
            --maxmemory 512mb
            --maxmemory-policy noeviction
            --port 6381
        # === STORAGE ============================================== #
        volumes:
            - redis-durable-data:/data
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # ports:
        #     - "6381:6381"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-p", "6381", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    traefik:
        # === IMAGE ================================================ #
        image: traefik:2
        # === EXECUTION ============================================ #
        command:
            - --api.dashboard=true
            - --api.insecure=true
            - --providers.docker
            - --providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME:-agenta-ee-dev}`)
            - --entrypoints.web.address=:80
            - --ping=true
            - --accesslog=true
        # === STORAGE ============================================== #
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        ports:
            - "${TRAEFIK_PORT:-80}:80"
            - "${TRAEFIK_UI_PORT:-8080}:8080"
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: ["CMD", "traefik", "healthcheck", "--ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

    supertokens:
        # === IMAGE ================================================ #
        image: supertokens/supertokens-postgresql:11
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        environment:
            POSTGRESQL_CONNECTION_URI: ${POSTGRES_URI_SUPERTOKENS:-postgresql://username:password@postgres:5432/agenta_ee_supertokens}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # === ORCHESTRATION ======================================== #
        depends_on:
            postgres:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
        # === LIFECYCLE ============================================ #
        restart: always
        healthcheck:
            test: >
                bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
            interval: 10s
            timeout: 5s
            retries: 5

    stripe:
        # === IMAGE ================================================ #
        image: stripe/stripe-cli:latest
        # === EXECUTION ============================================ #
        command:
            [
                listen,
                --forward-to,
                http://api:8000/billing/stripe/events/,
                --events,
                "customer.subscription.created,customer.subscription.deleted,invoice.updated,invoice.upcoming,invoice.payment_failed,invoice.payment_succeeded",
            ]
        # === CONFIGURATION ======================================== #
        env_file:
            - ${ENV_FILE:-./.env.ee.dev}
        # === NETWORK ============================================== #
        networks:
            - agenta-network
        # === LIFECYCLE ============================================ #
        restart: always

networks:
    agenta-network:

volumes:
    postgres-data:
    redis-volatile-data:
    redis-durable-data:
    nextjs-ee-cache:
    nextjs-oss-cache:
    turbo-ee-cache:
