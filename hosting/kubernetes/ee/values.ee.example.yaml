agenta:
  # --- License ---
  license: ee

  # --- Core endpoints ---
  webUrl: "http://localhost"
  servicesUrl: "http://localhost/services"
  apiUrl: "http://localhost/api"
  # apiInternalUrl:

  # --- Secrets (REPLACE in production!) ---
  authKey: "replace-me"
  cryptKey: "replace-me"

