# ================================================================== #
# Agenta — minimal values.yaml
#
# This file mirrors the docker-compose env surface defined in
#   hosting/docker-compose/oss/env.oss.gh.example
#   hosting/docker-compose/ee/env.ee.gh.example
#
# Variables that are uncommented in the compose example are uncommented
# here with the same default value.  Variables that are commented-out
# in compose are omitted entirely — templates supply sensible defaults
# via helm's `default` function and helpers in _helpers.tpl.
#
# All Kubernetes plumbing (image repositories, tags, ports, replicas,
# resources, security contexts, ingress wiring, postgresql/redis bundled
# deployment knobs) lives in the templates, not here.  Override only
# what you need.
# ================================================================== #

# ================================================================== #
# Agenta — License (https://agenta.ai/pricing)
# ================================================================== #
agenta:
  license: oss

  # ================================================================ #
  # Agenta — Core endpoints
  # ================================================================ #
  # webUrl/apiUrl/servicesUrl are intentionally unset here. The chart derives
  # them from ingress.host when ingress.enabled=true, and the example values
  # in hosting/kubernetes/{oss,ee}/values.*.example.yaml set them explicitly
  # for the port-forward (no-ingress) path. A validation in _validations.tpl
  # fails the install if any of the three resolves to empty — that catches
  # the common "ingress disabled, URLs not set" misconfiguration as well as
  # partial overrides (e.g. setting only webUrl with ingress disabled).

  # ================================================================ #
  # Agenta — Secrets (REPLACE in production!)
  # ================================================================ #
  authKey: "replace-me"
  cryptKey: "replace-me"

# ================================================================== #
# docker (compose-only — no-op on Kubernetes, kept commented so the
# helm surface mirrors the compose env without taking effect here).
# ================================================================== #
# docker:
#   networkMode: "bridge"

# ================================================================== #
# postgres — connection settings.
# The compose example ships POSTGRES_PASSWORD=password as the default
# for the bundled postgres deployment.  Mirror that here so the chart
# renders out-of-the-box; production users must override.
# ================================================================== #
postgres:
  password: "password"

# ================================================================== #
# posthog
# ================================================================== #
posthog:
  apiKey: "phc_hmVSxIjTW1REBHXgj2aw4HW9X6CXb6FzerBgP9XenC7"

# ================================================================== #
# postgresql (Bitnami subchart) — bundled deployment.
#  - enabled: required for the subchart's Chart.yaml condition to fire
#  - auth.username: lines up with what the chart-managed pgauth Secret
#    and the Agenta connection URIs expect
#  - primary.persistence.size: pinned so the Bitnami default never
#    floats (volumeClaimTemplates is immutable on a StatefulSet)
#  - primary.initdb.scriptsConfigMap: points Bitnami at the chart-
#    managed initdb ConfigMap that creates agenta_{core,tracing,supertokens}.
#    The single-quoted tpl expression is rendered by the Bitnami subchart
#    at install time (Helm does not tpl-render values.yaml itself).
#  - global.postgresql.auth.{existingSecret,secretKeys}: tell Bitnami to
#    read POSTGRES_PASSWORD from the chart-managed `<release>-pgauth`
#    Secret instead of generating its own
# ================================================================== #
postgresql:
  enabled: true
  auth:
    username: "agenta"
  primary:
    initdb:
      scriptsConfigMap: '{{ printf "%s-postgresql-initdb" .Release.Name }}'
    persistence:
      size: "10Gi"

global:
  postgresql:
    auth:
      existingSecret: '{{ printf "%s-pgauth" .Release.Name }}'
      secretKeys:
        userPasswordKey: "POSTGRES_PASSWORD"
        adminPasswordKey: "POSTGRES_PASSWORD"

# ================================================================== #
# redisDurable — bundled redis StatefulSet, durable queue.
#  - persistence.size: pinned for the same reason postgres is pinned;
#    a floating default would break upgrades because volumeClaimTemplates
#    is immutable on a StatefulSet.
# ================================================================== #
redisDurable:
  persistence:
    size: "5Gi"

# ================================================================== #
# agentRunner — runner-backed agent workflow runner.
# The services pod calls this over AGENTA_RUNNER_URL. Keep provider
# credentials scoped here instead of putting them in every Agenta container.
# ================================================================== #
agentRunner:
  enabled: true
  port: 8765
  provider: "local"
  enableMcp: false
  # daytona — only used when provider is "daytona". All optional.
  # daytona:
  #   apiKey: ""
  #   apiUrl: ""
  #   target: ""
  #   snapshot: ""
  #   image: ""
  #   installPi: true
  #   autostopDelay: 15  # idle minutes before a leaked sandbox self-reaps (DAYTONA_AUTOSTOP)

# ================================================================== #
# mounts — durable object store for session/agent mounts (the agent's
# persistent working directory). Opt-in: off by default. When enabled with
# the bundled SeaweedFS, the API + runner get matching S3 credentials
# and the runner pod gains FUSE (SYS_ADMIN + /dev/fuse) for geesefs.
# To use an external store (AWS S3 / R2 / MinIO) instead, set
# seaweedfs.enabled=false and provide endpointUrl + accessKey/secretKey.
# ================================================================== #
mounts:
  enabled: false
  # endpointUrl: ""            # external store only; empty endpoint = real AWS S3
  # region: "us-east-1"
  # bucket: "agenta-mounts"
  # accessKey: ""              # required when enabled (secret)
  # secretKey: ""              # required when enabled (secret)
  # signingKey: ""             # base64 32-byte; enables in-process S3 STS (scoped creds)
  seaweedfs:
    enabled: true              # bundle SeaweedFS; set false to point at an external store
    # port: 8333
    # image:
    #   repository: chrislusf/seaweedfs
    #   tag: latest
    persistence:
      size: "10Gi"
      # storageClass: ""
