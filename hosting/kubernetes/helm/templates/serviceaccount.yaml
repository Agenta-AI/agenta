{{- $values := include "agenta.values" . | fromYaml -}}
{{- $serviceAccount := default dict $values.serviceAccount -}}
{{- /* `default true $sa.create` would treat an explicit `false` as
       unset and still create the SA. Use hasKey so an explicit false
       is honored; default to true only when the key is omitted.
       agenta.serviceAccountName uses the same logic so pod
       references stay consistent. */ -}}
{{- $create := true -}}
{{- if hasKey $serviceAccount "create" -}}{{- $create = $serviceAccount.create -}}{{- end -}}
{{- if $create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenta.serviceAccountName" . }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
  {{- with $serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /* None of the Agenta workloads talk to the Kubernetes API. Disable
       token automount by default so we don't mount a credential the
       pods never use. Override via serviceAccount.automountServiceAccountToken
       if a workload ever needs it. */}}
automountServiceAccountToken: {{ default false $serviceAccount.automountServiceAccountToken }}
{{- end }}
