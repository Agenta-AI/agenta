{{- $runner := default dict .Values.agentRunner -}}
{{- $daytona := default dict $runner.daytona -}}
{{- if eq (include "agenta.agentRunner.enabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.agentRunner.serviceName" . }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ include "agenta.agentRunner.replicas" . }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $runner.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: {{ include "agenta.agentRunnerImage" . }}
          imagePullPolicy: {{ include "agenta.agentRunner.pullPolicy" . }}
          {{- /* FUSE for the durable session cwd: geesefs mounts the store prefix on-host for
                 local sandboxes, which needs SYS_ADMIN + /dev/fuse. Only granted when mounts is
                 on; an explicit runner.securityContext (if set) overrides this default. */ -}}
          {{- if $runner.securityContext }}
          securityContext:
            {{- toYaml $runner.securityContext | nindent 12 }}
          {{- else if eq (include "agenta.store.enabled" .) "true" }}
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ include "agenta.agentRunner.port" . }}
              protocol: TCP
          env:
            - name: AGENTA_RUNNER_PORT
              value: {{ include "agenta.agentRunner.port" . | quote }}
            - name: SANDBOX_AGENT_PROVIDER
              value: {{ default "local" $runner.provider | quote }}
            {{- if not (hasKey (default dict $runner.env) "PI_CODING_AGENT_DIR") }}
            - name: PI_CODING_AGENT_DIR
              value: {{ default "/pi-agent" $runner.piAgentDir | quote }}
            {{- end }}
            {{- if $runner.logLevel }}
            - name: SANDBOX_AGENT_LOG_LEVEL
              value: {{ $runner.logLevel | quote }}
            {{- end }}
            {{- if $daytona.apiUrl }}
            - name: DAYTONA_API_URL
              value: {{ $daytona.apiUrl | quote }}
            {{- end }}
            {{- if $daytona.target }}
            - name: DAYTONA_TARGET
              value: {{ $daytona.target | quote }}
            {{- end }}
            {{- if $daytona.snapshot }}
            - name: DAYTONA_SNAPSHOT
              value: {{ $daytona.snapshot | quote }}
            {{- end }}
            {{- if $daytona.image }}
            - name: DAYTONA_IMAGE
              value: {{ $daytona.image | quote }}
            {{- end }}
            {{- if $daytona.autostopDelay }}
            - name: DAYTONA_AUTOSTOP
              value: {{ $daytona.autostopDelay | quote }}
            {{- end }}
            {{- if hasKey $daytona "sessionIdleTtlMs" }}
            - name: AGENTA_RUNNER_DAYTONA_SESSION_IDLE_TTL_MS
              value: {{ $daytona.sessionIdleTtlMs | quote }}
            {{- end }}
            {{- if hasKey $daytona "sessionMaxWarm" }}
            - name: AGENTA_RUNNER_DAYTONA_SESSION_MAX_WARM
              value: {{ $daytona.sessionMaxWarm | quote }}
            {{- end }}
            {{- if $daytona.autodeleteDelay }}
            - name: DAYTONA_AUTODELETE
              value: {{ $daytona.autodeleteDelay | quote }}
            {{- end }}
            {{- if hasKey $daytona "installPi" }}
            - name: AGENTA_AGENT_SANDBOX_PI_INSTALLED
              value: {{ $daytona.installPi | quote }}
            {{- end }}
            {{- if or $daytona.apiKey (eq (default "local" $runner.provider) "daytona") }}
            - name: DAYTONA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: DAYTONA_API_KEY
                  optional: true
            {{- end }}
            {{- range $key, $val := $runner.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with $runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and (eq (include "agenta.store.enabled" .) "true") (not $runner.securityContext) }}
          volumeMounts:
            - name: fuse
              mountPath: /dev/fuse
          {{- end }}
      {{- if and (eq (include "agenta.store.enabled" .) "true") (not $runner.securityContext) }}
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
      {{- end }}
      {{- with $runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
