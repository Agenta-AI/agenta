{{- $runner := default dict .Values.agentRunner -}}
{{- $providers := default dict $runner.providers -}}
{{- $enabledProviders := default (list "local") $providers.enabled -}}
{{- $daytona := default dict $providers.daytona -}}
{{- $auth := default dict $runner.auth -}}
{{- if eq (include "agenta.agentRunner.enabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.agentRunner.serviceName" . }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ include "agenta.agentRunner.replicas" . }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $runner.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: {{ include "agenta.agentRunnerImage" . }}
          imagePullPolicy: {{ include "agenta.agentRunner.pullPolicy" . }}
          {{- /* FUSE for the durable session cwd: geesefs mounts the store prefix on-host for
                 local sandboxes, which needs SYS_ADMIN + /dev/fuse. Only granted when mounts is
                 on; an explicit runner.securityContext (if set) overrides this default. */ -}}
          {{- if $runner.securityContext }}
          securityContext:
            {{- toYaml $runner.securityContext | nindent 12 }}
          {{- else if eq (include "agenta.store.enabled" .) "true" }}
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ include "agenta.agentRunner.port" . }}
              protocol: TCP
          env:
            {{- /* Narrow by design (runner-selfhosting-cleanup): a local harness process shares
                   this container, so anything here is readable from /proc. Only the runner's own
                   config and the API URL it needs to reach the platform — never the full
                   commonEnv (DB/auth/crypt/license/redis/store secrets). See
                   tests/test_runner_secret_absence.py. */}}
            - name: AGENTA_API_URL
              value: {{ include "agenta.apiUrlEffective" . | quote }}
            {{- $agentaVals := include "agenta.values" . | fromYaml -}}
            {{- if (default dict $agentaVals.agenta).apiInternalUrl }}
            - name: AGENTA_API_INTERNAL_URL
              value: {{ $agentaVals.agenta.apiInternalUrl | quote }}
            {{- end }}
            - name: AGENTA_RUNNER_PORT
              value: {{ include "agenta.agentRunner.port" . | quote }}
            - name: AGENTA_RUNNER_ENABLED_SANDBOX_PROVIDERS
              value: {{ join "," $enabledProviders | quote }}
            - name: AGENTA_RUNNER_DEFAULT_SANDBOX_PROVIDER
              value: {{ default "local" $providers.default | quote }}
            {{- /* Stable replica id for a single-runner install: a local-sandbox session is
                   owned by the pod that created it, and a pod restart with a fresh random id
                   would orphan those sessions for the owner TTL. A fixed value (the service
                   name) is safe only at one replica; with several pods a shared id would make
                   every pod claim every session, so we set it only when replicas == 1. Local
                   multi-replica is unsupported anyway (no sticky routing); scale with Daytona.
                   A Deployment renames the pod on restart, so a fixed value beats the pod name. */}}
            {{- if and (eq (include "agenta.agentRunner.replicas" . | int) 1) (not (hasKey (default dict $runner.env) "AGENTA_RUNNER_REPLICA_ID")) }}
            - name: AGENTA_RUNNER_REPLICA_ID
              value: {{ include "agenta.agentRunner.serviceName" . | quote }}
            {{- end }}
            {{- if not (hasKey (default dict $runner.env) "PI_CODING_AGENT_DIR") }}
            - name: PI_CODING_AGENT_DIR
              value: {{ default "/pi-agent" $runner.piAgentDir | quote }}
            {{- end }}
            {{- if $runner.logLevel }}
            - name: AGENTA_RUNNER_LOG_LEVEL
              value: {{ $runner.logLevel | quote }}
            {{- end }}
            {{- if $daytona.apiUrl }}
            - name: AGENTA_RUNNER_DAYTONA_API_URL
              value: {{ $daytona.apiUrl | quote }}
            {{- end }}
            {{- if $daytona.target }}
            - name: AGENTA_RUNNER_DAYTONA_TARGET
              value: {{ $daytona.target | quote }}
            {{- end }}
            {{- if $daytona.snapshot }}
            - name: AGENTA_RUNNER_DAYTONA_SNAPSHOT
              value: {{ $daytona.snapshot | quote }}
            {{- end }}
            {{- if $daytona.image }}
            - name: AGENTA_RUNNER_DAYTONA_IMAGE
              value: {{ $daytona.image | quote }}
            {{- end }}
            {{- if $daytona.autostopMinutes }}
            - name: AGENTA_RUNNER_DAYTONA_AUTOSTOP_MINUTES
              value: {{ $daytona.autostopMinutes | quote }}
            {{- end }}
            {{- if hasKey $daytona "sessionIdleTtlMs" }}
            - name: AGENTA_RUNNER_DAYTONA_SESSION_IDLE_TTL_MS
              value: {{ $daytona.sessionIdleTtlMs | quote }}
            {{- end }}
            {{- if hasKey $daytona "sessionMaxWarm" }}
            - name: AGENTA_RUNNER_DAYTONA_SESSION_MAX_WARM
              value: {{ $daytona.sessionMaxWarm | quote }}
            {{- end }}
            {{- if $daytona.autodeleteMinutes }}
            - name: AGENTA_RUNNER_DAYTONA_AUTODELETE_MINUTES
              value: {{ $daytona.autodeleteMinutes | quote }}
            {{- end }}
            {{- if $daytona.apiKeySecretRef }}
            - name: AGENTA_RUNNER_DAYTONA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $daytona.apiKeySecretRef.name | quote }}
                  key: {{ $daytona.apiKeySecretRef.key | quote }}
                  optional: true
            {{- end }}
            {{- /* Shared runner protocol credential (interface.md section 2): the runner verifies it
                   and Services sends the same value (see agentRunner.servicesEnv). REQUIRED — the
                   runner refuses to boot without it, so this is always rendered and never
                   `optional`. An explicit `auth.tokenSecretRef` overrides the platform Secret for
                   operators who keep the runner credential in their own vault. Note this mounts a
                   SINGLE key, not the whole Secret: the runner's env must stay narrow, because a
                   local harness shares its container and can read /proc (tests/test_runner_secret_absence.py). */}}
            - name: AGENTA_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if $auth.tokenSecretRef }}
                  name: {{ $auth.tokenSecretRef.name | quote }}
                  key: {{ $auth.tokenSecretRef.key | quote }}
                  {{- else }}
                  name: {{ include "agenta.fullname" . | quote }}
                  key: AGENTA_RUNNER_TOKEN
                  {{- end }}
            {{- range $key, $val := $runner.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with $runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and (eq (include "agenta.store.enabled" .) "true") (not $runner.securityContext) }}
          volumeMounts:
            - name: fuse
              mountPath: /dev/fuse
          {{- end }}
      {{- if and (eq (include "agenta.store.enabled" .) "true") (not $runner.securityContext) }}
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
      {{- end }}
      {{- with $runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
