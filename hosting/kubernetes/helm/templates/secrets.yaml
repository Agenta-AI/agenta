{{- include "agenta.validateLicense" . -}}
{{- include "agenta.validateRequiredSecrets" . -}}
{{- include "agenta.validatePublicUrls" . -}}
{{- include "agenta.validateRedisDurablePersistenceToggle" . -}}
{{- $values := include "agenta.values" . | fromYaml -}}
{{- $secrets := default dict $values.secrets -}}
{{- $agenta := default dict $values.agenta -}}
{{- $postgres := default dict $values.postgres -}}
{{- $redisVolatile := default dict $values.redisVolatile -}}
{{- $redisDurable := default dict $values.redisDurable -}}
{{- $supertokens := default dict $values.supertokens -}}
{{- $sendgrid := default dict $values.sendgrid -}}
{{- $composio := default dict $values.composio -}}
{{- $newrelic := default dict $values.newrelic -}}
{{- $cloudflare := default dict $values.cloudflare -}}
{{- $turnstile := default dict $cloudflare.turnstile -}}
{{- $identity := default dict $values.identity -}}
{{- $llm := default dict $values.llm -}}
{{- $aiServices := default dict $agenta.aiServices -}}
{{- $loops := default dict $values.loops -}}
{{- $daytona := default dict $values.daytona -}}
{{- if not $secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenta.fullname" . }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  AGENTA_AUTH_KEY: {{ required "agenta.authKey is required (use --set agenta.authKey=<value>)" $agenta.authKey | quote }}
  AGENTA_CRYPT_KEY: {{ required "agenta.cryptKey is required (use --set agenta.cryptKey=<value>)" $agenta.cryptKey | quote }}
  {{- /* POSTGRES_PASSWORD is referenced by the generated postgres URIs (via
         $(POSTGRES_PASSWORD) substitution) and by the bundled Bitnami
         subchart. When full external URIs for all three databases are
         provided AND the bundled subchart is disabled, the URIs carry
         their own credentials and POSTGRES_PASSWORD is never substituted —
         but Deployments still mount it from this Secret, so we always
         emit the key (empty when unused) to keep Pods schedulable.
         agenta.validateRequiredSecrets gates whether it must be set. */}}
  POSTGRES_PASSWORD: {{ default "" $postgres.password | quote }}
  {{- if $supertokens.apiKey }}
  SUPERTOKENS_API_KEY: {{ $supertokens.apiKey | quote }}
  {{- end }}
  {{- if $redisVolatile.password }}
  REDIS_VOLATILE_PASSWORD: {{ $redisVolatile.password | quote }}
  {{- end }}
  {{- if $redisDurable.password }}
  REDIS_DURABLE_PASSWORD: {{ $redisDurable.password | quote }}
  {{- end }}
  {{- /* Legacy flat-map OAuth + LLM input (pre-v0.100.3). Still supported. */}}
  {{- range $key, $val := $secrets.oauth }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- range $key, $val := $secrets.llmProviders }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- /* identity.<provider> — structured OAuth/OIDC config (v0.100.3+). Each
       conditional sits on its own line so the rendered KEY: lines always keep
       their two-space indent under stringData:. */}}
  {{- with $identity.apple }}
    {{- if .clientId }}
  APPLE_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  APPLE_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
    {{- if .keyId }}
  APPLE_KEY_ID: {{ .keyId | quote }}
    {{- end }}
    {{- if .privateKey }}
  APPLE_PRIVATE_KEY: {{ .privateKey | quote }}
    {{- end }}
    {{- if .teamId }}
  APPLE_TEAM_ID: {{ .teamId | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.azureAd }}
    {{- if .clientId }}
  AZURE_AD_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  AZURE_AD_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
    {{- if .directoryId }}
  AZURE_AD_DIRECTORY_ID: {{ .directoryId | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.bitbucket }}
    {{- if .clientId }}
  BITBUCKET_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  BITBUCKET_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.boxySaml }}
    {{- if .clientId }}
  BOXY_SAML_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  BOXY_SAML_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
    {{- if .url }}
  BOXY_SAML_URL: {{ .url | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.discord }}
    {{- if .clientId }}
  DISCORD_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  DISCORD_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.facebook }}
    {{- if .clientId }}
  FACEBOOK_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  FACEBOOK_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.github }}
    {{- if .clientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.gitlab }}
    {{- if .baseUrl }}
  GITLAB_BASE_URL: {{ .baseUrl | quote }}
    {{- end }}
    {{- if .clientId }}
  GITLAB_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  GITLAB_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.google }}
    {{- if .clientId }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.googleWorkspaces }}
    {{- if .clientId }}
  GOOGLE_WORKSPACES_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  GOOGLE_WORKSPACES_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
    {{- if .hd }}
  GOOGLE_WORKSPACES_HD: {{ .hd | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.linkedin }}
    {{- if .clientId }}
  LINKEDIN_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  LINKEDIN_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.okta }}
    {{- if .clientId }}
  OKTA_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  OKTA_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
    {{- if .domain }}
  OKTA_DOMAIN: {{ .domain | quote }}
    {{- end }}
  {{- end }}
  {{- with $identity.twitter }}
    {{- if .clientId }}
  TWITTER_OAUTH_CLIENT_ID: {{ .clientId | quote }}
    {{- end }}
    {{- if .clientSecret }}
  TWITTER_OAUTH_CLIENT_SECRET: {{ .clientSecret | quote }}
    {{- end }}
  {{- end }}
  {{- /* llm.<provider> — structured LLM provider API keys (v0.100.3+) */}}
  {{- if $llm.alephalpha }}
  ALEPHALPHA_API_KEY: {{ $llm.alephalpha | quote }}
  {{- end }}
  {{- if $llm.anthropic }}
  ANTHROPIC_API_KEY: {{ $llm.anthropic | quote }}
  {{- end }}
  {{- if $llm.anyscale }}
  ANYSCALE_API_KEY: {{ $llm.anyscale | quote }}
  {{- end }}
  {{- if $llm.cohere }}
  COHERE_API_KEY: {{ $llm.cohere | quote }}
  {{- end }}
  {{- if $llm.deepinfra }}
  DEEPINFRA_API_KEY: {{ $llm.deepinfra | quote }}
  {{- end }}
  {{- if $llm.gemini }}
  GEMINI_API_KEY: {{ $llm.gemini | quote }}
  {{- end }}
  {{- if $llm.groq }}
  GROQ_API_KEY: {{ $llm.groq | quote }}
  {{- end }}
  {{- if $llm.minimax }}
  MINIMAX_API_KEY: {{ $llm.minimax | quote }}
  {{- end }}
  {{- if $llm.mistral }}
  MISTRAL_API_KEY: {{ $llm.mistral | quote }}
  {{- end }}
  {{- if $llm.openai }}
  OPENAI_API_KEY: {{ $llm.openai | quote }}
  {{- end }}
  {{- if $llm.openrouter }}
  OPENROUTER_API_KEY: {{ $llm.openrouter | quote }}
  {{- end }}
  {{- if $llm.perplexityai }}
  PERPLEXITYAI_API_KEY: {{ $llm.perplexityai | quote }}
  {{- end }}
  {{- if $llm.togetherai }}
  TOGETHERAI_API_KEY: {{ $llm.togetherai | quote }}
  {{- end }}
  {{- if $sendgrid.apiKey }}
  SENDGRID_API_KEY: {{ $sendgrid.apiKey | quote }}
  {{- end }}
  {{- if $composio.apiKey }}
  COMPOSIO_API_KEY: {{ $composio.apiKey | quote }}
  {{- end }}
  {{- if $newrelic.licenseKey }}
  NEWRELIC_LICENSE_KEY: {{ $newrelic.licenseKey | quote }}
  {{- end }}
  {{- if $turnstile.secretKey }}
  CLOUDFLARE_TURNSTILE_SECRET_KEY: {{ $turnstile.secretKey | quote }}
  {{- end }}
  {{- if $aiServices.apiKey }}
  AGENTA_AI_SERVICES_API_KEY: {{ $aiServices.apiKey | quote }}
  {{- end }}
  {{- if $aiServices.refinePromptKey }}
  AGENTA_AI_SERVICES_REFINE_PROMPT_KEY: {{ $aiServices.refinePromptKey | quote }}
  {{- end }}
  {{- if $loops.apiKey }}
  LOOPS_API_KEY: {{ $loops.apiKey | quote }}
  {{- end }}
  {{- if $daytona.apiKey }}
  DAYTONA_API_KEY: {{ $daytona.apiKey | quote }}
  {{- end }}
{{- end }}
