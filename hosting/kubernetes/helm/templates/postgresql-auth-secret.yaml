{{- include "agenta.validatePgauthSecret" . -}}
{{- $values := include "agenta.values" . | fromYaml -}}
{{- $secrets := default dict $values.secrets -}}
{{- $postgres := default dict $values.postgres -}}
{{- if and (eq (include "agenta.postgresql.enabled" .) "true") (not $secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenta.pgauthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgres.password is required" $postgres.password | quote }}
{{- end }}
