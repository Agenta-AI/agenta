{{- $values := include "agenta.values" . | fromYaml -}}
{{- $workerWebhooks := default dict $values.workerWebhooks -}}
{{- $newrelic := default dict $values.newrelic -}}
{{- if eq (include "agenta.workerWebhooks.enabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-worker-webhooks
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-webhooks
spec:
  replicas: {{ include "agenta.workerWebhooks.replicas" . }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-webhooks
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-webhooks
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $workerWebhooks.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $init := include "agenta.initContainers" . }}
      {{- if $init }}
      initContainers:
        {{- $init | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-webhooks
          image: {{ include "agenta.apiImage" . }}
          imagePullPolicy: {{ include "agenta.api.pullPolicy" . }}
          {{- with $workerWebhooks.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: {{ if $newrelic.licenseKey }}["newrelic-admin", "run-program", "python", "-m", "entrypoints.worker_webhooks"]{{ else }}["python", "-m", "entrypoints.worker_webhooks"]{{ end }}
          env:
            {{- include "agenta.commonEnv" . | nindent 12 }}
            {{- range $key, $val := $workerWebhooks.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "entrypoints.worker_webhooks"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with $workerWebhooks.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $workerWebhooks.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $workerWebhooks.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $workerWebhooks.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
