{{- if eq (include "agenta.redisDurable.enabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenta.fullname" . }}-redis-durable
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-durable
spec:
  type: ClusterIP
  ports:
    - port: {{ include "agenta.redisDurable.port" . }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "agenta.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis-durable
{{- end }}
