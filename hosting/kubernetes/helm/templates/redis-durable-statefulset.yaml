{{- $values := include "agenta.values" . | fromYaml -}}
{{- $redisDurable := default dict $values.redisDurable -}}
{{- $persistence := default dict $redisDurable.persistence -}}
{{- $persistenceEnabled := true -}}
{{- if hasKey $persistence "enabled" -}}
{{- $persistenceEnabled = $persistence.enabled -}}
{{- end -}}
{{- if eq (include "agenta.redisDurable.enabled" .) "true" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agenta.fullname" . }}-redis-durable
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-durable
spec:
  serviceName: {{ include "agenta.fullname" . }}-redis-durable
  replicas: 1
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis-durable
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis-durable
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $redisDurable.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ include "agenta.redisDurableImage" . }}
          imagePullPolicy: {{ include "agenta.redisDurable.pullPolicy" . }}
          {{- with $redisDurable.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - >-
              exec redis-server
              --appendonly yes
              --appendfsync no
              --save ""
              --maxmemory {{ include "agenta.redisDurable.maxmemory" . | quote }}
              --maxmemory-policy {{ include "agenta.redisDurable.maxmemoryPolicy" . }}
              --port {{ include "agenta.redisDurable.port" . | quote }}
              {{- if $redisDurable.password }}
              --requirepass "$REDIS_DURABLE_PASSWORD"
              {{- end }}
          ports:
            - name: redis
              containerPort: {{ include "agenta.redisDurable.port" . }}
              protocol: TCP
          {{- if $persistenceEnabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
          {{- if $redisDurable.password }}
          env:
            - name: REDIS_DURABLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: REDIS_DURABLE_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: REDIS_DURABLE_PASSWORD
          {{- end }}
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", {{ include "agenta.redisDurable.port" . | quote }}, "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", {{ include "agenta.redisDurable.port" . | quote }}, "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with $redisDurable.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $redisDurable.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $redisDurable.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $redisDurable.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $persistenceEnabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if hasKey $persistence "storageClass" }}
        storageClassName: {{ $persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ default "5Gi" $persistence.size }}
  {{- end }}
{{- end }}
