{{- $values := include "agenta.values" . | fromYaml -}}
{{- $supertokens := default dict $values.supertokens -}}
{{- if eq (include "agenta.supertokens.enabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-supertokens
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: supertokens
spec:
  replicas: {{ include "agenta.supertokens.replicas" . }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: supertokens
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: supertokens
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $supertokens.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq (include "agenta.postgresql.enabled" .) "true" }}
      initContainers:
        {{- include "agenta.waitForPostgres" . | nindent 8 }}
      {{- end }}
      containers:
        - name: supertokens
          image: {{ include "agenta.supertokensImage" . }}
          imagePullPolicy: {{ include "agenta.supertokens.pullPolicy" . }}
          {{- with $supertokens.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ include "agenta.supertokens.port" . }}
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_CONNECTION_URI
              value: {{ include "agenta.postgresUriSupertokens" . | quote }}
            - name: SUPERTOKENS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: SUPERTOKENS_API_KEY
                  optional: true
            {{- range $key, $val := $supertokens.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /hello
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /hello
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with $supertokens.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $supertokens.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $supertokens.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $supertokens.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
