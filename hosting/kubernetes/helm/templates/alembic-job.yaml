{{- $values := include "agenta.values" . | fromYaml -}}
{{- $alembic := default dict $values.alembic -}}
{{- if eq (include "agenta.alembic.enabled" .) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agenta.fullname" . }}-alembic
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: alembic
  annotations:
    # post-install/post-upgrade (not pre-) is intentional: pre-install hooks
    # run before any release resources are created, so the PostgreSQL
    # StatefulSet would not exist yet and the migration job would deadlock
    # waiting for the database.  The tradeoff is that application pods may
    # briefly start against an unmigrated schema; their init-containers
    # wait for PostgreSQL readiness but not for Alembic completion.  In
    # practice this is acceptable because the migration job finishes within
    # seconds and Kubernetes will restart any pods that fail their startup
    # probes during that window.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  activeDeadlineSeconds: {{ include "agenta.alembic.activeDeadlineSeconds" . }}
  backoffLimit: {{ include "agenta.alembic.backoffLimit" . }}
  ttlSecondsAfterFinished: {{ include "agenta.alembic.ttlSecondsAfterFinished" . }}
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: alembic
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with $alembic.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      {{- if eq (include "agenta.postgresql.enabled" .) "true" }}
      initContainers:
        {{- include "agenta.waitForPostgres" . | nindent 8 }}
      {{- end }}
      containers:
        - name: alembic
          image: {{ include "agenta.apiImage" . }}
          imagePullPolicy: {{ include "agenta.api.pullPolicy" . }}
          {{- with $alembic.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - {{ printf "python -m %s" (include "agenta.alembicRunnerModule" .) | quote }}
          env:
            {{- include "agenta.commonEnv" . | nindent 12 }}
            - name: ALEMBIC_AUTO_MIGRATIONS
              {{- if hasKey $alembic "autoMigrations" }}
              value: {{ $alembic.autoMigrations | quote }}
              {{- else }}
              value: "true"
              {{- end }}
            - name: ALEMBIC_CFG_PATH_CORE
              value: {{ include "agenta.alembicCfgPathCore" . | quote }}
            - name: ALEMBIC_CFG_PATH_TRACING
              value: {{ include "agenta.alembicCfgPathTracing" . | quote }}
            {{- range $key, $val := $alembic.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- with $alembic.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $alembic.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $alembic.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $alembic.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
