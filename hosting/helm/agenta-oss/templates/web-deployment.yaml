{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-web
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with .Values.web.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "agenta.webImage" . }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          {{- with .Values.web.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/web/entrypoint.sh"]
          args: ["node", {{ include "agenta.webServerPath" . | quote }}]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: AGENTA_LICENSE
              value: {{ include "agenta.edition" . | quote }}
            - name: AGENTA_WEB_URL
              value: {{ .Values.global.webUrl | quote }}
            - name: AGENTA_API_URL
              value: {{ .Values.global.apiUrl | quote }}
            - name: AGENTA_SERVICES_URL
              value: {{ .Values.global.servicesUrl | quote }}
            - name: AGENTA_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: AGENTA_AUTH_KEY
            - name: AGENTA_CRYPT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: AGENTA_CRYPT_KEY
            - name: SUPERTOKENS_CONNECTION_URI
              value: {{ include "agenta.supertokensUri" . | quote }}
            - name: SUPERTOKENS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenta.secretName" . }}
                  key: SUPERTOKENS_API_KEY
                  optional: true
            {{- include "agenta.webOptionalEnv" . | nindent 12 }}
            {{- range $key, $val := .Values.web.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
