{{- if .Values.workerEvents.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-worker-events
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-events
spec:
  replicas: {{ .Values.workerEvents.replicas }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-events
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-events
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with .Values.workerEvents.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        {{- include "agenta.waitForPostgres" . | nindent 8 }}
        {{- end }}
        {{- include "agenta.waitForRedis" . | nindent 8 }}
      containers:
        - name: worker-events
          image: {{ include "agenta.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.workerEvents.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["newrelic-admin", "run-program", "python", "-m", "entrypoints.worker_events"]
          env:
            {{- include "agenta.commonEnv" . | nindent 12 }}
            {{- range $key, $val := .Values.workerEvents.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "entrypoints.worker_events"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.workerEvents.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.workerEvents.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerEvents.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerEvents.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
