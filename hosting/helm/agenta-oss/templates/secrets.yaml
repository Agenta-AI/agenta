{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenta.fullname" . }}
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  AGENTA_AUTH_KEY: {{ required "secrets.agentaAuthKey is required (use --set secrets.agentaAuthKey=<value>)" .Values.secrets.agentaAuthKey | quote }}
  AGENTA_CRYPT_KEY: {{ required "secrets.agentaCryptKey is required (use --set secrets.agentaCryptKey=<value>)" .Values.secrets.agentaCryptKey | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required (use --set secrets.postgresPassword=<value>)" .Values.secrets.postgresPassword | quote }}
  {{- if .Values.secrets.supertokensApiKey }}
  SUPERTOKENS_API_KEY: {{ .Values.secrets.supertokensApiKey | quote }}
  {{- end }}
  {{- if .Values.redisVolatile.password }}
  REDIS_VOLATILE_PASSWORD: {{ .Values.redisVolatile.password | quote }}
  {{- end }}
  {{- if .Values.redisDurable.password }}
  REDIS_DURABLE_PASSWORD: {{ .Values.redisDurable.password | quote }}
  {{- end }}
  {{- range $key, $val := .Values.secrets.oauth }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- range $key, $val := .Values.secrets.llmProviders }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- range $key, $val := .Values.secrets.extraEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
