{{- if .Values.services.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-services
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: services
spec:
  replicas: {{ .Values.services.replicas }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: services
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: services
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with .Values.services.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        {{- include "agenta.waitForPostgres" . | nindent 8 }}
        {{- end }}
        {{- include "agenta.waitForRedis" . | nindent 8 }}
      containers:
        - name: services
          image: {{ include "agenta.servicesImage" . }}
          imagePullPolicy: {{ .Values.services.image.pullPolicy }}
          {{- with .Values.services.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            {{- if .Values.observability.newRelic.licenseKey }}
            - newrelic-admin
            - run-program
            {{- end }}
            - gunicorn
            - entrypoints.main:app
            - --bind
            - 0.0.0.0:{{ .Values.services.port }}
            - --worker-class
            - uvicorn.workers.UvicornWorker
            - --workers
            - {{ .Values.services.workers | quote }}
            - --max-requests
            - "10000"
            - --max-requests-jitter
            - "1000"
            - --timeout
            - "60"
            - --graceful-timeout
            - "60"
            - --log-level
            - info
            - --access-logfile
            - "-"
            - --error-logfile
            - "-"
          ports:
            - name: http
              containerPort: {{ .Values.services.port }}
              protocol: TCP
          env:
            {{- include "agenta.commonEnv" . | nindent 12 }}
            - name: SCRIPT_NAME
              value: "/services"
            {{- range $key, $val := .Values.services.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.services.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.services.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.services.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.services.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
