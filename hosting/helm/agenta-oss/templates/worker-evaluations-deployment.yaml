{{- if .Values.workerEvaluations.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenta.fullname" . }}-worker-evaluations
  labels:
    {{- include "agenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-evaluations
spec:
  replicas: {{ .Values.workerEvaluations.replicas }}
  selector:
    matchLabels:
      {{- include "agenta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-evaluations
  template:
    metadata:
      labels:
        {{- include "agenta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-evaluations
    spec:
      {{- include "agenta.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agenta.serviceAccountName" . }}
      {{- with .Values.workerEvaluations.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        {{- include "agenta.waitForPostgres" . | nindent 8 }}
        {{- end }}
        {{- include "agenta.waitForRedis" . | nindent 8 }}
      containers:
        - name: worker-evaluations
          image: {{ include "agenta.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.workerEvaluations.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: {{ if eq (include "agenta.edition" .) "oss" }}["newrelic-admin", "run-program", "python", "-m", "entrypoints.worker_evaluations"]{{ else }}["python", "-m", "entrypoints.worker_evaluations"]{{ end }}
          env:
            {{- include "agenta.commonEnv" . | nindent 12 }}
            {{- range $key, $val := .Values.workerEvaluations.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "entrypoints.worker_evaluations"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.workerEvaluations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.workerEvaluations.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerEvaluations.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerEvaluations.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
