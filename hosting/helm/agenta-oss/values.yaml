# SuperTokens
# =================================================================
supertokens:
  enabled: true
  image:
    repository: registry.supertokens.io/supertokens/supertokens-postgresql
    # SuperTokens is a third-party image — .Chart.AppVersion is not a valid
    # tag for it, so we default to "latest" (matching docker-compose behavior).
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3567
  env: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Only used when supertokens.enabled=false
  external:
    uri: ""

# =================================================================
# Ingress
# =================================================================
ingress:
  enabled: true
  className: "traefik"
  host: ""
  tls: []
  #  - secretName: agenta-tls
  #    hosts:
  #      - agenta.example.com
  annotations: {}
  # Path prefix stripping for /api and /services is REQUIRED — the backend
  # services expect requests without the prefix. The API and Services
  # deployments set SCRIPT_NAME (which FastAPI reads as root_path) so that
  # generated OpenAPI docs and redirect URLs include the prefix, but the
  # actual routing inside the app uses the stripped path.
  #
  # Traefik — set the annotation and add the Middleware via extraObjects:
  #   annotations:
  #     traefik.ingress.kubernetes.io/router.middlewares: <namespace>-strip-prefixes@kubernetescrd
  #   (see extraObjects below for the matching Middleware resource)
  #
  # NGINX Ingress Controller:
  #   className: nginx
  #   annotations:
  #     nginx.ingress.kubernetes.io/use-regex: "true"
  #     nginx.ingress.kubernetes.io/rewrite-target: /$1

# =================================================================
# Extra Objects — arbitrary Kubernetes resources managed by this release.
# Supports {{ .Release.Namespace }} and other Helm template expressions.
# =================================================================
extraObjects: []
# Example: Traefik StripPrefix Middleware (required when using Traefik ingress)
#  - apiVersion: traefik.io/v1alpha1
#    kind: Middleware
#    metadata:
#      name: strip-prefixes
#      namespace: "{{ .Release.Namespace }}"
#    spec:
#      stripPrefix:
