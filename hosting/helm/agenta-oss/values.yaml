  # Only used when supertokens.enabled=false
  external:
    uri: ""

# =================================================================
# Ingress
# =================================================================
ingress:
  enabled: true
  className: "traefik"
  host: ""
  tls: []
  #  - secretName: agenta-tls
  #    hosts:
  #      - agenta.example.com
  annotations: {}
  # Ingress paths — controls how traffic is routed to each backend.
  # The defaults use Prefix pathType, which works with Traefik.
  #
  # For NGINX Ingress Controller, override with regex capture groups:
  #   paths:
  #     api:
  #       path: /api/(.*)
  #       pathType: ImplementationSpecific
  #     services:
  #       path: /services/(.*)
  #       pathType: ImplementationSpecific
  #     web:
  #       path: /(.*)
  #       pathType: ImplementationSpecific
  #   annotations:
  #     nginx.ingress.kubernetes.io/use-regex: "true"
  #     nginx.ingress.kubernetes.io/rewrite-target: /$1
  paths:
    api:
      path: /api
      pathType: Prefix
    services:
      path: /services
      pathType: Prefix
    web:
      path: /
      pathType: Prefix
  # Path prefix stripping for /api and /services is REQUIRED — the backend
  # services expect requests without the prefix.
  #
  # Traefik — set the annotation and add the Middleware via extraObjects:
  #   annotations:
  #     traefik.ingress.kubernetes.io/router.middlewares: <namespace>-strip-prefixes@kubernetescrd
  #   (see extraObjects below for the matching Middleware resource)

# =================================================================
# Extra Objects — arbitrary Kubernetes resources managed by this release.
# Supports {{ .Release.Namespace }} and other Helm template expressions.
# =================================================================
extraObjects: []
# Example: Traefik StripPrefix Middleware (required when using Traefik ingress)
#  - apiVersion: traefik.io/v1alpha1
#    kind: Middleware
#    metadata:
#      name: strip-prefixes
#      namespace: "{{ .Release.Namespace }}"
#    spec:
#      stripPrefix:
#        prefixes:
#          - /api
#          - /services
