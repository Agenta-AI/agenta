# =================================================================
# Global
# =================================================================
global:
  agentaLicense: "oss"
  webUrl: "http://localhost"
  apiUrl: "http://localhost/api"
  servicesUrl: "http://localhost/services"
  posthogApiKey: "phc_hmVSxIjTW1REBHXgj2aw4HW9X6CXb6FzerBgP9XenC7"
  imagePullSecrets: []
  # Wire the Bitnami subchart to read the PostgreSQL password from the
  # chart-managed secret so users only need to set secrets.postgresPassword.
  #
  # The default is a Go template expression evaluated by Bitnami's tpl()
  # function at render time, so it automatically adapts to any release name.
  #
  # If you use secrets.existingSecret (a pre-created K8s Secret), set this to
  # the SAME secret name so Bitnami reads POSTGRES_PASSWORD from it:
  #   global.postgresql.auth.existingSecret: "my-secret"
  postgresql:
    auth:
      existingSecret: '{{ printf "%s-pgauth" .Release.Name }}'
      secretKeys:
        userPasswordKey: "POSTGRES_PASSWORD"
        adminPasswordKey: "POSTGRES_PASSWORD"

# =================================================================
# Secrets
# =================================================================
secrets:
  # Set to the name of an existing Secret to use instead of the chart-managed one.
  # The Secret must contain keys: AGENTA_AUTH_KEY, AGENTA_CRYPT_KEY, POSTGRES_PASSWORD
  #
  # When using this with the bundled PostgreSQL (postgresql.enabled=true), you must
  # also set global.postgresql.auth.existingSecret to the SAME secret name so the
  # Bitnami subchart can read POSTGRES_PASSWORD from it. Example:
  #   --set secrets.existingSecret=my-secret
  #   --set global.postgresql.auth.existingSecret=my-secret
  existingSecret: ""
  # REQUIRED — helm install will fail if these are not set (when existingSecret is empty).
  # Generate random keys:
  #   openssl rand -hex 32
  agentaAuthKey: ""
  agentaCryptKey: ""
  postgresPassword: ""
  supertokensApiKey: ""
  # Extra OAuth env vars injected into backend pods and the web pod.
  oauth: {}
  #   GOOGLE_OAUTH_CLIENT_ID: ""
  #   GOOGLE_OAUTH_CLIENT_SECRET: ""
  # Extra LLM provider API keys injected into backend pods only.
  llmProviders: {}
  #   OPENAI_API_KEY: ""
  #   ANTHROPIC_API_KEY: ""

# =================================================================
# Access control (backend-only)
# =================================================================
accessControl:
  allowedDomains: ""
  blockedDomains: ""
  blockedEmails: ""
  orgCreationAllowlist: ""

# =================================================================
# Email
# =================================================================
email:
  sendgrid:
    apiKey: ""
    fromAddress: ""

# =================================================================
# Integrations / observability
# =================================================================
integrations:
  composio:
    apiKey: ""
    apiUrl: "https://backend.composio.dev/api/v3"

observability:
  newRelic:
    licenseKey: ""

# =================================================================
# Anti-bot (leave unset by default for self-hosted EE)
# =================================================================
captcha:
  turnstile:
    siteKey: ""
    secretKey: ""

# =================================================================
# ServiceAccount
# =================================================================
serviceAccount:
  # Set to true to create a ServiceAccount for Agenta pods.
  create: false
  # Annotations to add to the ServiceAccount (e.g. for IAM roles).
  annotations: {}
  # Override the ServiceAccount name. Defaults to the fullname template.
  name: ""

# =================================================================
# PostgreSQL (Bitnami subchart) — internal / external toggle
# =================================================================
postgresql:
  enabled: true
  auth:
    username: "agenta"
  primary:
    initdb:
      scriptsConfigMap: '{{ printf "%s-postgresql-initdb" .Release.Name }}'
    persistence:
      size: 10Gi
  databases:
    core: ""
    tracing: ""
    supertokens: ""
  # Only used when postgresql.enabled=false
  external:
    host: ""                    # REQUIRED when enabled=false
    port: 5432
    username: "agenta"
    sslmode: "prefer"           # Appended to auto-constructed URIs only (ignored when full URI overrides are set). Set to "" to omit.
    # Full URI overrides (optional — constructed from host/port/user/pass/db if empty)
    uriCore: ""
    uriTracing: ""
    uriSupertokens: ""

# =================================================================
# Redis — Volatile (cache, pub/sub)
# =================================================================
redisVolatile:
  enabled: true
  image:
    repository: redis
    tag: "8"
    pullPolicy: IfNotPresent
  port: 6379
  # Optional password for Redis authentication. When set, the Redis server
  # starts with --requirepass and the URI includes the credential.
  password: ""
  maxmemory: "512mb"
  maxmemoryPolicy: "volatile-lru"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Only used when redisVolatile.enabled=false
  external:
    uri: ""

# =================================================================
# Redis — Durable (queues, persistent state)
# =================================================================
redisDurable:
  enabled: true
  image:
    repository: redis
    tag: "8"
    pullPolicy: IfNotPresent
  port: 6381
  # Optional password for Redis authentication. When set, the Redis server
  # starts with --requirepass and the URI includes the credential.
  password: ""
  maxmemory: "512mb"
  maxmemoryPolicy: "noeviction"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Only used when redisDurable.enabled=false
  external:
    uri: ""

# =================================================================
# API
# =================================================================
# NOTE: The workers (workerEvaluations, workerTracing) and cron containers
# reuse the API image. There is no separate image configuration for them.
#
# The official API image includes newrelic-admin. It acts as a no-op
# passthrough when NEW_RELIC_LICENSE_KEY is not set.
api:
  enabled: true
  image:
    repository: ""
    # Defaults to .Chart.AppVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  workers: 2
  env: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  podSecurityContext: {}
  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  nodeSelector: {}
  tolerations: []
  affinity: {}

