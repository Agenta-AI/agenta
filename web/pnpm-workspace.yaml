packages:
  - 'oss'
  - 'ee'
  - 'tests'
  - 'packages/*'
  # Spike apps for ts-sdk-tracing design (see web/examples/README.md).
  # `examples/*` matches each spike app directory once it has a package.json.
  # `examples/.shared/*` matches the verification harness package; the dot-prefix
  # keeps it out of `examples/*` (default glob doesn't match dot-prefixed dirs).
  - 'examples/*'
  - 'examples/.shared/*'
allowBuilds:
  '@parcel/watcher': set this to true or false
  '@swc/core': set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
