# DRAFT — copy this file to .github/workflows/deploy-website.yml when ready to enable.
# Do NOT place this file in .github/workflows/ yet; a live workflow on a public repo
# deploys on every push to main affecting website/ which we are not ready for.
#
# This workflow replicates Workers Builds behaviour via GitHub Actions:
#   push to main, paths website/** → pnpm install → prebuild (font fetch) → build → wrangler deploy
#
# It does NOT provide per-PR preview URLs (that requires the Cloudflare Workers Builds
# GitHub App, which only Mahmoud can install via browser OAuth). Workers Builds is the
# long-term target; this workflow covers the first deploy and any pre-Builds CI window.
#
# Secrets required (add in the GitHub repo → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   — API token with Workers Scripts:Edit + R2 Storage:Edit
#   CLOUDFLARE_ACCOUNT_ID  — 32-char hex Cloudflare account ID
#   PUBLIC_POSTHOG_KEY     — PostHog project API key (public, but keep out of git)
#
# See deploy-runbook.md for the full setup procedure.

name: Deploy marketing website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"

  # Allow manual trigger from the Actions tab (e.g. for a first deploy or rollback).
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin to match packageManager field in website/package.json.
          version: "10.30.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch licensed fonts from R2 (prebuild)
        # fetch-fonts.mjs exits 0 even on failure; missing fonts fall back to
        # system-font stacks defined in tokens.css.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/fetch-fonts.mjs

      - name: Build site
        env:
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          # Optional: set PUBLIC_GA_ID if a GA4 property has been created.
          # PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
