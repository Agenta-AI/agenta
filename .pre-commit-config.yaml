repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check --fix
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
      - id: pnpm-format-fix
        name: pnpm format-fix (web)
        entry: bash -c 'cd web && pnpm format-fix'
        language: system
        files: ^web/.*\.(js|jsx|cjs|mjs|ts|tsx|cts|mts|mdx)$
        pass_filenames: false
      - id: pnpm-lint-fix
        name: pnpm lint-fix (web)
        entry: bash -c 'cd web && pnpm lint-fix'
        language: system
        files: ^web/.*\.(js|jsx|cjs|mjs|ts|tsx|cts|mts|mdx)$
        pass_filenames: false
      - id: gitleaks-pre-commit
        name: gitleaks git (staged only)
        entry: bash -c 'gitleaks --config .gitleaks.toml --exit-code 1 --verbose git --staged'
        language: system
        pass_filenames: false
      - id: gitleaks-pre-push
        name: gitleaks git (pre-push, scan diff)
        entry: bash -c 'gitleaks --config .gitleaks.toml --exit-code 1 --verbose git --log-opts "$(git merge-base HEAD "origin/$(git rev-parse --abbrev-ref HEAD)" 2>/dev/null || git merge-base HEAD origin/main)..HEAD"'
        language: system
        stages: [pre-push]
        pass_filenames: false
